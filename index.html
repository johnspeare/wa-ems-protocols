<li>EtCO₂ normal range: 35–45 mmHg; may be higher in COPD patients</li></ul></div></div>`},

{id:'sepsis',title:'Sepsis (Adult)',section:'medical',
tags:'sepsis infection septic shock fever tachycardia hypotension altered mental status EtCO2 sepsis alert',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Fever, known infection</li>
<li>Immunosuppression (HIV, chemotherapy)</li>
<li>Indwelling medical device; Recent surgery/hospital stay</li>
<li>Recent antibiotics or steroids; Hx adrenal insufficiency</li></ul></div>
<div class="assess-col"><div class="assess-head">Sepsis Guidelines</div><ul>
<li class="b">Suspected or known infection AND EtCO₂ &lt;26</li>
<li class="b">PLUS ≥2 of the following:</li>
<li>Temperature &lt;96.0°F OR &gt;100.4°F</li>
<li>HR &gt;90 AND RR &gt;22</li>
<li>SBP &lt;90 mmHg</li>
<li class="b">Altered Mental Status (GCS &lt;15)</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>Stroke; Pulmonary embolism; Anaphylaxis</li>
<li>Hyperthermia/Heat illness; Hypothermia/Cold illness</li>
<li>Substance abuse/Toxic exposure</li>
<li>Hypo-/Hyperthyroid; Hypoglycemia</li></ul></div></div>
<div class="proto-note">🏥 Notify receiving hospital of <strong>"Sepsis Alert"</strong></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Sepsis Criteria (all must apply)</div><ul>
<li>Suspected or known infection AND EtCO₂ &lt;26</li>
<li>Meet ≥2: Altered mentation; Temp &lt;96.0°F OR &gt;100.4°F; HR &gt;90 AND RR &gt;22; Hypotension (SBP &lt;90 or MAP &lt;65)</li>
<li>MAP calculation: (2 × diastolic + systolic) ÷ 3</li></ul></div>
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>O₂ to maintain SpO₂ above 95%</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Consider ECG / 12-lead if available</li>
<li><span class="ws">W*</span> Consider End-Tidal CO₂ if available</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension protocol</li></ul></div></div>`},

{id:'seizures',title:'Seizures / Febrile Seizure',section:'medical',
tags:'seizure febrile epilepsy status epilepticus tonic clonic postictal glucose acetaminophen',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Number and duration of seizures; Head trauma</li>
<li>Hx seizure or status epilepticus</li>
<li>Medication compliance/dosage; Anticoagulant therapy</li>
<li>Substance abuse/toxic ingestion; Fever</li>
<li>LMP, pregnancy</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li class="b">Altered Mental Status (postictal)</li>
<li class="b">Fever / Rash / Nuchal Rigidity</li>
<li class="b">Head trauma</li>
<li>Incontinence; Observed seizure activity</li>
<li>Tonic / Clonic activity</li>
<li class="b">Status epilepticus</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>Hypoxia; Medication/Toxin; Muscle spasm</li>
<li>Hypoglycemia; Syncope; Infection; Fever</li>
<li>Shunt malfunction; Intracranial mass/bleed</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Protect from injury — do NOT put anything in mouth; lower patient to ground when possible</li>
<li><span class="ws">W*</span> Check blood glucose; if &lt;60 mg/dL → Altered Mental Status protocol</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Temperature &gt;101.0°F:<ul>
<li><span class="ws">W*</span> Acetaminophen 15 mg/kg PO if child can maintain airway and swallow; or per rectal suppository if unable</li>
<li>If child &gt;6 months and max acetaminophen dose &lt;4 hr ago and temp still &gt;101°F: Ibuprofen 10 mg/kg PO if able to swallow</li></ul></li>
<li><span class="ws">W*</span> Consider End-Tidal CO₂ if available</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>Adult SBP &lt;90 mmHg → Shock/Hypotension protocol</li>
<li>Pediatric below min acceptable BP → Shock/Hypotension protocol</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Considerations</div><ul>
<li>Place pregnant patients on left side for transport</li>
<li>All first-time seizure patients require physician evaluation</li>
<li>If patient NOT actively seizing on arrival (postictal), IV not required</li>
<li>Seizures that self-terminate in known epileptic may not require treatment or transport</li>
<li>Seizures may be a sign of cerebral hypoxia from cardiac arrest</li>
<li>If evidence/suspicion of trauma, immobilize spine</li>
<li>Consider nasopharyngeal airway; elevate head of bed to 30°</li></ul></div></div>`},

{id:'sickle-cell',title:'Sickle Cell Pain Crisis',section:'medical',
tags:'sickle cell pain crisis anemia hemoglobin analgesic opioid vascular access',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Evaluate and manage altered mental status</li>
<li>Consider ALS for evaluation and management of pain</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Treat pain per Pain Management protocol</li>
<li>Treat nausea/vomiting per Nausea/Vomiting protocol</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Start IV; provide saline 10 mL/kg NS bolus (up to 1 L)</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Considerations</div><ul>
<li>Comfort measures: keep patient warm and dry; position of comfort unless clinical condition requires otherwise</li>
<li>Assess for life-threatening complications: Acute Chest Syndrome, Stroke, Meningitis, Septic arthritis, Splenic sequestration crisis, Traumatic pain</li>
<li>Patients may have higher tolerance to narcotic pain medications</li>
<li>These patients tolerate acute blood loss poorly due to baseline anemia</li>
<li>Fever should be considered an emergency — transport for bacteremia risk</li>
<li>Sickle cell TRAIT patients can have pain crises in extreme conditions (heat exhaustion, dehydration) — several athlete deaths linked to sickle cell trait</li></ul></div></div>`},

{id:'shock-hypotension',title:'Shock (Non-Traumatic) / Hypotension',section:'medical',
tags:'shock hypotension hypoperfusion fluid resuscitation IV saline tachycardia low blood pressure',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Allergic reaction; Bleeding (GI or vaginal)</li>
<li>Cardiac ischemia (MI, CHF)</li>
<li>Hx of Adrenal Insufficiency; Medications</li>
<li>Recent illness (Sepsis)</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li class="b">Altered mental status, confusion, agitation</li>
<li class="b">Black or tarry stools</li>
<li class="b">Emesis (bright red or coffee-ground)</li>
<li class="b">Hypotension; Pale, cool, clammy skin, diaphoresis</li>
<li class="b">Rales and pulmonary edema; Respiratory distress</li>
<li class="b">Syncope; Tachycardia, delayed capillary refill</li>
<li class="b">Weak, rapid pulse; Weakness, dizziness</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>Allergic reaction; Anaphylaxis; Cardiac-related illness</li>
<li>Dehydration; Dysrhythmias; Ectopic pregnancy</li>
<li>Infection/Sepsis; Neurogenic; Trauma</li>
<li>Toxic ingestion; Vasovagal; Vomiting/Diarrhea</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR / EMT</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Control external bleeding</li></ul></div>
<div class="lv sga-lv"><div class="lv-tag sga-tag">EMT w/ SGA Endorsement</div><ul>
<li>If airway not manageable by BLS, consider SGA if patient unresponsive</li>
<li><span class="ws">W*</span> Consider End-Tidal CO₂ if available</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access — preferably two access points</li>
<li>If lung fields clear: initial fluid challenge 500 mL NS; additional challenges as needed to maintain cerebral perfusion, max 2,000 mL</li>
<li>Pediatric fluid bolus: 20 mL/kg NS; may repeat to max 60 mL/kg</li>
<li><strong>Head Injury:</strong> target BP 100–110 mmHg systolic (MAP &gt;65); target EtCO₂ 35–40 mmHg</li>
<li><strong>Sepsis:</strong> establish 2 large bore IVs (consider IO)</li>
<li><strong>Adult NS/LR:</strong><ul>
<li>Normotensive: 10 mL/kg IV/IO in 250–500 mL increments (max 2 L); reassess after each bolus</li>
<li>Hypotensive: 20 mL/kg IV/IO in 250–500 mL increments (max 2 L; pressure infusion until MAP &gt;65, JVD, or rales)</li></ul></li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>Tachycardia may be early sign of shock — pulse pressure often narrows before systolic BP falls</li>
<li>Changing level of consciousness = important clue</li>
<li>Transport in supine position as soon as possible</li>
<li>Keep patient warm (heat packs, reflective blankets PRN)</li></ul></div></div>`},

{id:'stroke',title:'Stroke / Suspected Stroke / TIA / Neurological',section:'medical',
tags:'stroke TIA CVA neurological FAST BEFAST LAMS aphasia weakness facial droop paralysis fibrinolytic',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Previous CVA, TIA's</li>
<li>Previous cardiac/vascular surgery</li>
<li>Diabetes; Hypertension, CAD; Atrial fibrillation</li>
<li>Medications (blood thinners); History of trauma</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li class="b">Abnormal vital signs</li>
<li class="b">Altered mental status</li>
<li class="b">Aphasia / Dysarthria</li>
<li class="b">Blindness or other sensory loss</li>
<li class="b">Headache; Seizures; Syncope</li>
<li class="b">Respiratory pattern change</li>
<li class="b">Vertigo/Dizziness; Vomiting</li>
<li class="b">Weakness / Paralysis</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>Atypical migraine; Bell's palsy</li>
<li>H⁺ (acidosis); Hypoglycemia</li>
<li>Hypo-/Hyperkalemia; Hypovolemia; Hypoxia</li>
<li>Hypothermia; Seizure — Todd's paralysis</li>
<li>Toxins; Tamponade; Tension pneumothorax; Thrombosis</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Perform <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">FAST</a>, <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">BEFAST</a>, or <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">LAMS</a> exam</li>
<li>Determine LAST KNOWN WELL TIME — critical</li>
<li>Position with head and chest elevated or position of comfort</li>
<li>Check temperature and pulse oximetry</li>
<li>O₂ to maintain SpO₂ 94–95%</li>
<li><span class="ws">W*</span> Capillary glucose; treat hypoglycemia per Altered Mental Status protocol</li>
<li>Give nothing by mouth unless hypoglycemic; suction as necessary</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Perform <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">FAST</a> exam, <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">BEFAST</a>, and <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">LAMS</a> Score</li>
<li>Contact appropriate receiving medical facility</li>
<li>Transport to closest appropriate medical facility</li>
<li>Notify receiving facility of STOKE Activation as soon as possible</li></ul></div>
<div class="lv sga-lv"><div class="lv-tag sga-tag">EMT w/ SGA Endorsement</div><ul>
<li>If airway not manageable by BLS, consider SGA</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension protocol</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>Scene time should be &lt;10 minutes; document contact info for someone who can provide illness history</li>
<li>Position patient with head of bed elevated approximately 30°</li>
<li>Transport per Prehospital Stroke Triage Destination Procedure</li></ul></div>
<div class="lv transport-lv"><div class="lv-tag transport-tag">Stroke Assessment Tools</div><ul>
<li><strong>FAST:</strong> Face drooping, Arm weakness, Speech difficulty, Time to call 911</li>
<li><strong>BEFAST:</strong> Balance, Eyes (vision change), Face, Arm, Speech, Time</li>
<li><strong>LAMS (Los Angeles Motor Scale):</strong> Facial droop (0–1), Arm weakness (0–2), Grip strength (0–2) — Score ≥4 suggests large vessel occlusion</li></ul></div></div>`},

{id:'syncope',title:'Syncope / Dizziness / Weakness',section:'medical',
tags:'syncope fainting dizziness weakness LOC loss consciousness vasovagal orthostatic palpitations',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Activity prior to episode (exertion, urinating/defecating)</li>
<li>Blood loss (GI, spontaneous abortion) / LMP</li>
<li>Chest pain/SOB; Diabetes; Trauma</li>
<li>True LOC; Nausea, vomiting, diarrhea</li>
<li>New medications / recent dose change</li>
<li>Witnessed seizure / seizure aura prior to event</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li class="b">Bradycardia; Hypotension</li>
<li class="b">Irregular heart rate</li>
<li>Lightheaded/dizzy; LOC with near-immediate recovery</li>
<li class="b">Palpitations; Tachycardia</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>CHF/MI; CVA/Seizure</li>
<li>Cardiac arrhythmia/Pacemaker dysfunction</li>
<li>Hypoglycemia; Hypoxia; Medication side effect</li>
<li>Shock/hypotension/orthostatic; Toxic ingestion</li>
<li>Vasovagal Episode</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Patient with identified underlying cause → treat per specific protocol</li>
<li>Continued neurologic derangement → Stroke/TIA/Neurological protocol</li>
<li>Ongoing mental status changes or coma → Altered Mental Status protocol</li>
<li>Oxygen as appropriate</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Cardiac monitor / 12-lead EKG if available</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension protocol</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>Syncope = loss of consciousness and postural tone, resolving spontaneously ("fainting")</li>
<li>Typically abrupt in onset and resolves quickly — may find patient awake and alert on arrival</li>
<li>Presyncope = "nearly blacking out" or "nearly fainting"</li>
<li>All patients suffering syncope deserve hospital evaluation, even if they appear normal with few complaints</li></ul></div></div>`},
{id:'trauma-general',title:'General Trauma Management',section:'trauma',
tags:'trauma MARCHH primary survey hemorrhage airway breathing circulation head injury spine immobilization mechanism injury',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Primary Survey — MARCHH Algorithm</div><ul>
<li><strong>M — Massive Hemorrhage:</strong> Initial visual and body sweep for penetrating wounds and severe life-threatening hemorrhage</li>
<li><strong>A — Airway:</strong> Assess patency; ask basic questions (stridor, ease of air movement); look for injuries causing obstruction (unstable facial fractures, expanding neck hematoma, blood/vomitus, facial burns)</li>
<li><strong>R — Respiratory/Breathing:</strong> Rate and pattern; assess for tension pneumothorax; chest wall symmetry; bilateral breath sounds; cover penetrating chest wounds with commercial chest seal (or occlusive dressing taped on 3 sides)</li>
<li><strong>C — Circulation:</strong> Assess BP and HR</li>
<li><strong>H — Head Injury:</strong> GCS/<a class="mlink" onclick="openProto('mnemonics');return false;" href="#">AVPU</a> and pupils; gross motor assessment; signs of TBI with herniation (unequal pupils, lateralizing motor signs, posturing)</li>
<li><strong>H — Hypothermia Prevention:</strong> Prevent further heat loss; maintain normal body temperature</li></ul></div>
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol; Initiate <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">MARCHH</a></li>
<li>Massive hemorrhage: stop severe external/extremity hemorrhage with tourniquet or hemostatic gauze wound packing; roll patient to examine back</li>
<li>Impaled objects: leave in place; stabilize by building up around object with multi-trauma dressings</li>
<li>Immobilize suspected fractures/dislocations; severe deformity with distal cyanosis/pulselessness → gentle in-line traction before splinting</li>
<li>Penetrating chest wound → occlusive dressing all 4 sides; if breathing worsens, lift one corner to release pressure then re-seal</li>
<li>Consider Spinal Motion Restriction protocol based on patient condition</li>
<li>Eye injuries: cover with rigid shield; cover non-injured eye to prevent conjugated movement</li>
<li>Do not allow patient to eat or drink; treat nausea per Nausea/Vomiting; treat pain per Pain Management</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Helmet removal considerations:<ul>
<li>Helmet only (no shoulder pads): remove helmet</li>
<li>Sports helmet + shoulder pads: stabilize for transport with both in place; remove facemask before transport; remove helmet/pads if they interfere with airway or immobilization</li></ul></li>
<li>Transport per Prehospital Trauma Triage Destination Procedure</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access (large bore preferred)</li>
<li><strong>Adult Fluid Resuscitation:</strong><ul>
<li>SBP &gt;90 and HR &lt;120 → no IV fluids required</li>
<li>SBP &lt;90 OR HR &gt;120 → 250 mL IV bolus to max 1 L or until SBP 90 mmHg or normal mental status</li>
<li>Head injury: target SBP &gt;110 mmHg; avoid hypotension</li></ul></li>
<li><strong>Pediatric Fluid Resuscitation:</strong><ul>
<li>Tachycardia for age with poor perfusion signs → 20 mL/kg crystalloid bolus; reassess; repeat for persistent signs</li>
<li>If signs/symptoms persist after 20 mL/kg total, contact online medical direction</li></ul></li></ul></div>
<div class="lv peds-lv"><div class="lv-tag peds-tag">Pediatric Considerations</div><ul>
<li>Consider non-accidental trauma (NAT)</li></ul></div></div>`},

{id:'blast-injuries',title:'Blast Injuries',section:'trauma',
tags:'blast explosion explosive trauma barotrauma burn shrapnel penetrating tympanic membrane',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Injury Pattern</div><ul>
<li><strong>Primary:</strong> Tympanic membrane (TM) rupture, pulmonary damage, air embolization, hollow viscus injury</li>
<li><strong>Secondary:</strong> Penetrating trauma, fragmentation, blunt trauma</li>
<li><strong>Tertiary:</strong> Injuries from displacement by blast wind; blunt/penetrating trauma, traumatic amputations</li>
<li><strong>Quaternary:</strong> All other injuries: crush, burns, asphyxia, toxic exposures, exacerbation of chronic illness</li></ul></div>
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR / EMT</div><ul>
<li>Initiate General Trauma Management protocol</li>
<li>Manage hemorrhage and extremity injuries per Extremity Trauma/External Hemorrhage protocol</li>
<li>Airway: if thermal or chemical burn to airway suspected, early airway control is vital</li>
<li>Respiratory: O₂ targeting SpO₂ 94–98%; assist respirations; cover open chest wounds with occlusive dressing; AVOID CPAP</li>
<li>Head injury: treat per Facial/Dental/Head Trauma or TBI protocol; apply spinal precautions per SMR protocol</li>
<li>Hypothermia prevention: prevent further heat loss</li>
<li>Treat pain per Pain Management; nausea per Nausea/Vomiting; do not allow to eat or drink</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access (large bore preferred)</li>
<li>Follow fluid resuscitation per General Trauma Management</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>Scene safety paramount when responding to explosion</li>
<li>Multi-system injuries: blunt/penetrating trauma, shrapnel, barotrauma, burns, toxic chemical exposure</li>
<li>Follow Prehospital Trauma Triage Destination Procedure</li>
<li>For threatened airway from burns: expedite rendezvous to closest advanced airway manager</li>
<li>Consider air transport and ALS upgrade for time advantage</li>
<li>Minimize IV fluid resuscitation in patients without signs of shock</li>
<li>Consider potential for barotrauma including tension pneumothorax and TM perforation</li>
<li>Rapid transport to trauma hospital preferable whenever possible</li></ul></div></div>`},

{id:'burns',title:'Burns',section:'trauma',
tags:'burns thermal chemical electrical TBSA rule of nines airway singed partial full thickness frostbite',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Assessment Findings</div><ul>
<li>Airway: stridor, hoarse voice; Mouth/nares: redness, blisters, soot, singed hairs</li>
<li>Breathing: rapid, shallow, wheezes, rales</li>
<li>Skin: estimate Total Burn Surface Area (TBSA) using Rule of Nines and depth (partial vs. full thickness)</li></ul></div>
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate General Trauma Management protocol</li>
<li>Stop the burning process with water or saline; remove wet/smoldering clothing and jewelry</li>
<li>Hazmat: brush off powdery substances before flushing wounds with tepid water; avoid hypothermia</li>
<li>Leave blisters intact</li>
<li>Continually monitor airway for obstruction</li>
<li>Cover burned area with dry sterile dressing — do NOT use ointment, lotion, or antiseptic</li>
<li>Estimate TBSA using Rule of Nines (superficial/1st degree burns NOT included in TBSA %)</li>
<li>SBP &lt;90 mmHg → consider other causes; treat per Shock/Hypotension protocol</li>
<li>Do not allow to eat or drink; nausea per Nausea/Vomiting; pain per Pain Management</li>
<li><strong>Chemical burn:</strong> Consider Haz-Mat response; protect self; flush with copious water; brush off dry chemicals first</li>
<li><strong>Electrical burn:</strong> Apply sterile dressings to entry and exit wounds</li>
<li><strong>Confined space/respiratory:</strong> Remove from hazard; administer high-flow O₂</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Consider ECG / 12-lead if available</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access (large bore preferred); follow fluid resuscitation</li>
<li>Large burn or TBSA &gt;20%: Adults and children &gt;14 yr: LR 500 mL/hr; Children 6–13 yr: LR 250 mL/hr; Children ≤5 yr: LR 125 mL/hr</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Transport — Contact MC for destination if any of the following</div><ul>
<li>Partial thickness burns &gt;10% TBSA; Burns involving face, hands, feet, genitalia, perineum, major joints</li>
<li>Third degree burns (any age); Electrical burns including lightning; Chemical burns; Inhalation injury</li>
<li>Burns with preexisting disorders; Burns + concomitant trauma; Burned children to hospitals without pediatric capability</li></ul></div>
<div class="lv transport-lv"><div class="lv-tag transport-tag">Rule of Nines</div><ul>
<li><strong>Adult:</strong> Head/neck 9%; Each arm 9%; Chest (front) 18%; Back 18%; Each leg 18%; Genitalia 1%</li>
<li><strong>Child:</strong> Head/neck 18%; Each arm 9%; Anterior trunk 18%; Posterior trunk 18%; Each leg 14%</li></ul></div></div>`},

{id:'taser-injury',title:'Conducted Electrical Weapon Injury (TASER®)',section:'trauma',
tags:'TASER conducted electrical weapon dart barbed delirium agitation excited restraint',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Key Considerations</div><ul>
<li>Device can be discharged: direct contact (no darts); single dart + contact; from distance up to 35 ft with two darts</li>
<li>19 pulses/sec; 2.1 milliamps per pulse; may precipitate arrhythmias — consider cardiac monitoring and 12-lead ECG</li>
<li>Patient may have underlying pathology before being tased</li></ul></div>
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Evaluate for delirium with agitated behavior (agitation, reduced pain sensitivity, elevated temperature, persistent struggling, hallucinosis)</li>
<li>Thoroughly assess for trauma — patient may have fallen from standing or higher</li>
<li>Ascertain number of TASER® cartridges used to identify total possible darts and contacts</li>
<li>Ensure patient appropriately secured with law enforcement assistance to protect patient and staff</li>
<li>Do NOT remove barbed darts from sensitive areas (head, neck, hands, feet, genitals) — see Taser Dart Removal procedure</li>
<li>Treat medical and traumatic injury</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT / AEMT</div><ul>
<li>Once patient appropriately secured, perform primary and secondary assessment including EKG, pulse oximetry, consider 12-lead ECG</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>Before removing barbed dart, ensure cartridge has been removed from weapon</li>
<li>Patients should NOT be restrained prone, face-down, or hog-tied — respiratory compromise is a significant risk</li>
<li>Perform comprehensive assessment with attention to signs/symptoms of active medical decompensation</li>
<li>Transport to hospital</li>
<li>EMS clinicians should NOT perform "medical clearance" for law enforcement to take patient to non-medical facility</li></ul></div></div>`},

{id:'crush-injury',title:'Crush Injury / Crush Syndrome',section:'trauma',
tags:'crush injury syndrome compartment syndrome entrapment rhabdomyolysis renal failure tourniquet',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Assessment Findings</div><ul>
<li>Mental status / GCS; Fractures and compartment syndrome (neurovascular status of injured extremity)</li>
<li>Examination of spine; Evidence of additional trauma</li></ul></div>
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate General Trauma Management protocol</li>
<li>Evaluate degree of entrapment and viability of extremities (absent pulse, blanched skin, capillary refill, sensation, extremely cold to touch)</li>
<li>Manage hemorrhage per Extremity Trauma/External Hemorrhage protocol</li>
<li>Initiate Spinal Motion Restriction protocol as needed</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension protocol</li>
<li>Do not allow to eat or drink; nausea per Nausea/Vomiting</li>
<li><strong>Wound care:</strong> Remove restrictive dressings/clothing/jewelry; monitor distal pulse, motor, sensation; bandage open wounds (irrigate if needed); stabilize foreign bodies; splint/immobilize injured areas</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Consider ECG / 12-lead if available</li>
<li>Treat pain per Pain Management protocol</li>
<li>For suspected pelvic crushing injuries, follow Pelvic Wrap procedure if indicated</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access (large bore preferred)</li>
<li>Follow fluid resuscitation per General Trauma Management</li>
<li>Prior to extrication: begin 1,000–2,000 mL fluid bolus; then maintain 500 mL/hr; contact MC for guidance on total fluid amount</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>Rapid extrication and transport to definitive care (trauma center preferred)</li>
<li>Patient may initially present with very few signs and symptoms — maintain high index of suspicion for compressive mechanism of injury</li></ul></div></div>`},

{id:'electrical-lightning',title:'Electrical Injuries / Lightning Strike',section:'trauma',
tags:'electrical injury lightning strike cardiac arrest burns arrhythmia neurologic trauma reverse triage',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Assessment Findings</div><ul>
<li>Thermal or non-thermal burns; Evidence of trauma</li>
<li>Focal neurologic deficits; Cardiac dysrhythmias</li></ul></div>
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate General Trauma Management protocol</li>
<li>Assure patent airway; if respiratory arrest only, manage airway appropriately</li>
<li>If cardiopulmonary arrest → start CPR</li>
<li>Apply Spinal Motion Restriction if associated trauma suspected</li>
<li>Apply dry dressing to wounds; remove constricting clothing and jewelry (swelling expected)</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension protocol</li>
<li>Do not allow to eat or drink; nausea per Nausea/Vomiting; pain per Pain Management</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Consider ECG / 12-lead if available</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Establish Vascular Access; follow fluid resuscitation per General Trauma Management</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>Lightning strike cardiac arrest patients have high rate of successful resuscitation if initiated early — in contrast to general cardiac arrest statistics</li>
<li><strong>Multiple victims — REVERSE TRIAGE:</strong> Treat cardiac arrest patients FIRST (those who appear dead); those who survive initial strike without cardiac arrest are likely to survive</li>
<li>Return of spontaneous circulation may precede resolution of respiratory arrest</li>
<li>Injury mechanisms: direct tissue damage, thermal energy (tissue destruction), mechanical injury (falls, violent muscle contraction)</li>
<li>May not be immediately apparent that patient is a lightning strike victim</li></ul></div></div>`},

{id:'extremity-trauma',title:'Extremity Trauma / External Hemorrhage Management',section:'trauma',
tags:'extremity trauma hemorrhage tourniquet wound packing hemostatic gauze fracture dislocation amputation bleeding',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate General Trauma Management protocol</li>
<li>Crush Injury/Crush Syndrome protocol if indicated</li>
<li><strong>Manage External Bleeding:</strong><ul>
<li>Expose wound; apply direct pressure; then pressure dressing</li>
<li>If direct pressure ineffective or impractical AND site amenable to tourniquet → apply commercial tourniquet:<ul>
<li>Place 2–3 inches proximal to wound, NOT over a joint; tighten until bleeding stops and distal pulse eliminated</li>
<li>If bleeding continues → second tourniquet proximal to first</li>
<li>Thigh wounds: consider two tourniquets side-by-side, tighten sequentially</li></ul></li></ul></li>
<li><strong>Wound Packing (Groin/axillary "junctional" injury or limb wound with persistent bleeding):</strong><ul>
<li>Materials: hemostatic gauze, regular gauze, or any available material</li>
<li>Pack tightly and fully to depth of wound until bleeding stops; apply direct pressure/pressure dressing</li>
<li>Do NOT remove packing to assess bleeding; pack around (do not remove) bone fragments or foreign objects</li></ul></li>
<li>Treat pain per Pain Management; do NOT loosen tourniquet to relieve pain</li>
<li><strong>Fractures/Dislocations:</strong><ul>
<li>Consider pain management before attempting to move suspected fracture</li>
<li>Compromised distal vascular function → gently attempt to restore normal anatomic position; reassess perfusion</li>
<li>Splint to limit movement; elevate above heart level; apply ice/cool packs (not directly to bare skin)</li>
<li>Reassess distal neurovascular status after any manipulation</li></ul></li>
<li>Remove wet/blood-soaked clothing; prevent heat loss; do not remove impaled foreign bodies</li>
<li>Initiate Spinal Motion Restriction as needed; SBP &lt;90 mmHg → Shock/Hypotension</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Consider ECG / 12-lead if available</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Establish Vascular Access (large bore preferred)</li>
<li>Follow fluid resuscitation per General Trauma Management</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>Tourniquet on bare skin, 2–3 inches proximal to wound; reassess at every stage of patient movement</li>
<li>Survival markedly improved when tourniquet placed BEFORE shock develops</li>
<li>Properly-applied tourniquet in conscious patient is painful — treat pain with analgesics but do NOT loosen</li>
<li><strong>Amputated parts:</strong> Cool but dry; plastic bag on ice in second bag; do NOT let amputated part contact ice directly; transport with patient for possible re-implantation</li>
<li>Pediatric: most commercial tourniquets effective for children &gt;2 yr; stretch-wrap-tuck elastic type for any age</li></ul></div></div>`},

{id:'facial-head-trauma',title:'Facial / Dental / Head Trauma',section:'trauma',
tags:'facial head trauma dental eye epistaxis avulsed tooth skull fracture mandible TBI GCS airway',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Assessment Findings</div><ul>
<li>ABCs with focus on airway patency; Bleeding (epistaxis, oral trauma, facial lacerations)</li>
<li>Medications (blood thinners/antiplatelet); Mental status for possible TBI; Gross vision; Dental avulsions</li>
<li>Unstable facial fractures that can abruptly compromise airway; Loose teeth and retropharynx bleeding</li></ul></div>
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR / EMT</div><ul>
<li>Initiate General Trauma Management; Initiate SMR protocol as needed</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension; nausea per Nausea/Vomiting; pain per Pain Management; NPO</li>
<li><strong>Avulsed tooth:</strong> Do NOT touch root; pick up by crown; if dirty, rinse under cold water 10 sec; place in milk or saline; alert patient can hold in mouth using own saliva</li>
<li><strong>Epistaxis:</strong> Squeeze nose (or patient does) continuously for 10–15 min</li>
<li><span class="ws">W*</span> Consider Oxymetazoline (Afrin) EMT/AEMT: Adult/Pediatric 2–3 squirts each nostril IN (not recommended &lt;6 yr)</li>
<li><strong>Eye trauma:</strong> Place eye shield for significant eye trauma; if globe avulsed/enucleated, do NOT put back; cover socket with moist saline dressings then eye shield</li>
<li><strong>Head wound:</strong> Direct pressure if no suspected open skull injury; moist sterile dressing for potential open skull wound; cover injured eye with moist saline + cup over it</li>
<li><strong>Mandible unstable:</strong> Patient unable to spit/swallow effectively — suction readily available; preferentially transport sitting up (absent spinal injury)</li>
<li><strong>Nose/ear avulsion:</strong> Recover tissue if possible; transport in dry sterile gauze in plastic bag on ice; moist sterile dressing for severe lacerations</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access (large bore preferred)</li>
<li>Follow fluid resuscitation per General Trauma Management; Consider EtCO₂</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>Consider non-accidental trauma/injury in pediatric patients</li>
<li>Airway may be compromised by fractures or bleeding; lost teeth not recovered on scene may be in the airway</li>
<li>Avulsed teeth can be re-implanted successfully if done very shortly after injury</li>
<li>For penetrating eye injuries: do NOT remove foreign bodies; splint in place; cover uninjured eye or ask patient to close it</li>
<li>Head injury severity: Mild GCS 14–15 (<a class="mlink" onclick="openProto('mnemonics');return false;" href="#">AVPU</a>=A); Moderate GCS 9–13 (AVPU=V); Severe GCS 3–8 (AVPU=P or U)</li>
<li>EtCO₂ target 40 mmHg (range 35–45); avoid hyperventilation, overventilation, hypocapnia</li></ul></div></div>`},

{id:'pelvis-trauma',title:'Pelvis Trauma',section:'trauma',
tags:'pelvis fracture pelvic binder hemorrhage trauma unstable hemodynamic instability',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Assessment Findings</div><ul>
<li>MOI; Blunt force trauma at waist or lower back</li>
<li>Pain and disability; Difficulty or inability to move legs</li>
<li>Feeling of lost rigidity/instability with palpation of hip joints</li>
<li>Abrasions, contusions, bleeding around rectal/vaginal/urethral areas or hematuria</li>
<li>Limb length discrepancy or deformity; Hematomas above inguinal ligament, scrotum, thigh</li>
<li>Symphysis gap on gentle palpation; Pelvic ring mobility with gentle compression of ASIS (limit compressions to single attempt)</li></ul></div>
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR / EMT</div><ul>
<li>Initiate General Trauma Management; SMR protocol as needed</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension; nausea per Nausea/Vomiting; NPO; pain per Pain Management</li>
<li><strong>Pelvic Stabilization — consider one of:</strong><ul>
<li>Commercial Pelvic Binder</li>
<li>Any other MPD-approved device</li>
<li>Pelvic Sheet Wrap (if commercial device unavailable): wrap sheet around pelvis and secure ends to maintain compression and stabilization during transport</li></ul></li>
<li>In males: ensure genitalia are elevated up out of the groin area and not entrapped by device</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access (large bore preferred)</li>
<li>Follow fluid resuscitation per General Trauma Management</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>Document time pelvic binder applied; BP changes before and after treatment</li>
<li>Stabilize but do NOT over-reduce injury, especially with lateral compression injuries</li>
<li>Reduction assessed by evaluating legs, greater trochanters, and patellae in anatomically neutral position</li></ul></div></div>`},

{id:'spinal-motion-restriction',title:'Spinal Motion Restriction (SMR) Guidelines',section:'trauma',
tags:'spinal SMR spine immobilization cervical collar backboard KED C-spine assessment mechanism',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Indications for SMR</div><ul>
<li>Altered mental status (including alcohol/drugs)</li>
<li>Spine pain or tenderness on palpation</li>
<li>Neurological signs/symptoms (numbness, tingling, weakness, paralysis)</li>
<li>Anatomic deformity of the spine</li>
<li>Distracting painful injury preventing reliable assessment</li>
<li>High mechanism of injury: high-speed MVC, fall from significant height, diving, axial load to head, penetrating injury near spine</li></ul></div>
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR / EMT — SMR Procedure</div><ul>
<li>If SMR indicated: apply appropriately sized cervical collar; maintain manual stabilization</li>
<li>Primary SMR method per local protocol (long backboard, KED, scoop, vacuum mattress)</li>
<li>Secure patient to device; maintain neutral alignment throughout</li>
<li>If SMR NOT indicated: place patient in position of comfort or position that best maintains airway</li>
<li>Pediatric: use appropriate-sized pediatric immobilization device; padding may be needed under torso to maintain neutral position</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>Manual stabilization must be maintained until SMR is complete</li>
<li>Evidence supports selective spinal immobilization — not all trauma patients require SMR</li>
<li>Penetrating trauma to head/neck/torso WITHOUT neurological symptoms does NOT require SMR — it may delay care and worsen outcomes</li>
<li>Helmet removal per General Trauma Management guidance</li>
<li>Reassess neurovascular status frequently</li>
<li>Padding under head for pediatric patients in car seats to maintain neutral spine position</li></ul></div></div>`},

{id:'traumatic-brain-injury',title:'Traumatic Brain Injury (TBI)',section:'trauma',
tags:'TBI traumatic brain injury GCS head trauma herniation ICP Cushing hypotension oxygen hyperventilation',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Assessment — Signs of Herniation</div><ul>
<li>Unequal/dilated pupils unresponsive to light</li>
<li>Posturing (decorticate or decerebrate)</li>
<li>Lateralizing motor signs</li>
<li>Cushing's Triad: hypertension + bradycardia + irregular respirations (late sign)</li></ul></div>
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR / EMT</div><ul>
<li>Initiate General Trauma Management; initiate SMR as appropriate</li>
<li>Airway management priority — protect airway</li>
<li>O₂ to maintain SpO₂ ≥95%; avoid hypoxia at all costs</li>
<li>Avoid hypotension: target SBP ≥90 mmHg (adult); target SBP &gt;110 mmHg with head injury</li>
<li>Avoid hyperventilation: normal ventilation rate (10–12/min adults; 12–20/min pediatric)</li>
<li><strong>EXCEPTION — Signs of herniation:</strong> controlled hyperventilation at 20/min adult (35/min infant) ONLY if signs of herniation AND hypoventilation not the cause</li>
<li>Elevate head of bed 30° if no spinal injury/hypotension</li>
<li>GCS assessment and documentation</li></ul></div>
<div class="lv sga-lv"><div class="lv-tag sga-tag">EMT w/ SGA Endorsement</div><ul>
<li>SGA if airway not manageable by BLS; <span class="ws">W*</span> EtCO₂ monitoring</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access (large bore preferred)</li>
<li>Fluid resuscitation per General Trauma Management — head injury target SBP &gt;110 mmHg</li>
<li>EtCO₂ target: 35–40 mmHg; document for all TBI patients with advanced airway</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>Hypotension + TBI = dramatically worsened outcome — aggressive BP management</li>
<li>Hypoxia + TBI = dramatically worsened outcome — aggressive O₂ management</li>
<li>EtCO₂ monitored and documented for all TBI patients with advanced airway; strict avoidance of hyperventilation, overventilation, and hypocapnia</li>
<li>Head injury severity: Mild GCS 14–15; Moderate GCS 9–13; Severe GCS 3–8</li>
<li>Consider non-accidental trauma in pediatric patients</li></ul></div></div>`},
{id:'12-lead-ecg',title:'12 Lead ECG Acquisition',section:'procedures',
tags:'12 lead ECG EKG cardiac monitor acquisition transmission STEMI telemetry',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Indications</div><ul>
<li>Chest pain or suspected ACS/MI/STEMI</li>
<li>Cardiac arrest or post-ROSC</li>
<li>Syncope, palpitations, or irregular rhythm</li>
<li>Altered mental status with suspected cardiac etiology</li>
<li>Any patient where cardiac monitoring is indicated</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Procedure — EMT (W**)</div><ul>
<li>Position patient supine; expose chest</li>
<li>Prepare skin: dry, clip hair if needed, clean with alcohol, abrade lightly if necessary</li>
<li>Place limb leads: RA (right arm), LA (left arm), RL (right leg), LL (left leg)</li>
<li>Place precordial leads:<ul>
<li>V1: 4th ICS, right sternal border</li>
<li>V2: 4th ICS, left sternal border</li>
<li>V3: between V2 and V4</li>
<li>V4: 5th ICS, midclavicular line</li>
<li>V5: anterior axillary line, same level as V4</li>
<li>V6: midaxillary line, same level as V4 and V5</li></ul></li>
<li>Acquire 12-lead; review computerized analysis</li>
<li>Transmit to receiving facility per local protocol</li>
<li>Do NOT delay transport to acquire 12-lead; acquire en route if possible</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>Movement artifact degrades tracing quality — minimize patient movement during acquisition</li>
<li>Right-sided leads (V3R, V4R) indicated for suspected right ventricular MI (inferior ST elevation)</li>
<li>Posterior leads (V7, V8, V9) for suspected posterior MI</li>
<li>Early 12-lead transmission can activate cath lab before hospital arrival, reducing door-to-balloon time</li>
<li>Do NOT disconnect VAD controller or batteries to acquire 12-lead</li></ul></div></div>`},

{id:'cpap',title:'Continuous Positive Airway Pressure (CPAP)',section:'procedures',
tags:'CPAP continuous positive airway pressure respiratory distress pulmonary edema CHF asthma COPD PEEP',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Indications</div><ul>
<li>Respiratory distress with suspected pulmonary edema, CHF, asthma, or COPD</li>
<li>Near-drowning with pulmonary edema</li>
<li>SpO₂ &lt;90% not responding to supplemental O₂</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Contraindications</div><ul>
<li>Respiratory arrest (use BVM instead)</li>
<li>Altered mental status with inability to protect airway</li>
<li>Vomiting or risk of vomiting</li>
<li>Facial trauma preventing adequate mask seal</li>
<li>Suspected pneumothorax</li>
<li>Blast injuries (avoid CPAP)</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Procedure — EMT <span class="ws">W*</span></div><ul>
<li>Select appropriately sized mask; explain procedure to patient</li>
<li>Connect O₂ supply (typically requires 15 L/min flow)</li>
<li>Set initial PEEP at 5 cmH₂O; titrate up to 10–15 cmH₂O as needed</li>
<li>Apply mask firmly; ensure adequate seal with no major leaks around edges</li>
<li>Instruct patient to breathe normally through the mask</li>
<li>Monitor SpO₂, respiratory rate, patient comfort, and mental status</li>
<li>If patient deteriorates or cannot tolerate → remove and ventilate with BVM</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>CPAP can dramatically reduce intubation rates and improve outcomes in pulmonary edema</li>
<li>Patient cooperation is essential — reassure and coach throughout</li>
<li>Monitor for tension pneumothorax development (decreasing SpO₂, hypotension, unequal breath sounds)</li>
<li>EtCO₂ monitoring useful if available</li>
<li>ETCO₂ normal range: 35–45 mmHg; higher normal in COPD patients</li></ul></div></div>`},

{id:'ez-io',title:'EZ-IO — Intraosseous (IO) Access',section:'procedures',
tags:'IO intraosseous EZ-IO vascular access tibia humerus sternum drill bone marrow',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Indications</div><ul>
<li>Immediate vascular access needed and IV access cannot be rapidly established</li>
<li>Cardiac arrest; hemodynamic instability; critical medication administration</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Contraindications</div><ul>
<li>Fracture or previous IO in same bone</li>
<li>IO in same bone within past 24 hours</li>
<li>Infection or burn over insertion site</li>
<li>Inability to locate landmarks</li>
<li>Prosthetic limb or joint at site</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Procedure — EMT <span class="wdbl">W**</span></div><ul>
<li><strong>Common sites:</strong> Proximal tibia (1–2 cm below tibial tuberosity, medial flat surface); Proximal humerus (greater tubercle); Distal tibia (2 cm proximal to medial malleolus)</li>
<li>Identify landmarks; cleanse site with antiseptic</li>
<li>Select appropriate needle set (Pink 15 mm standard adult; Blue 25 mm obese adult/obese pediatric; Yellow 45 mm humeral)</li>
<li>Remove safety cap; position needle perpendicular to bone with slight angle away from growth plate in pediatric patients</li>
<li>Drill until sudden decrease in resistance (indicates entry into marrow)</li>
<li>Remove stylet; confirm placement: aspirate blood/marrow, flush with 10 mL NS, note resistance</li>
<li>Secure with EZ-Stabilizer; connect to IV tubing</li>
<li>If conscious patient: 2% lidocaine 20–40 mg IO (flush with NS) for pain before flushing</li>
<li>Flush with 10 mL NS before each medication; may require pressure infusion for adequate flow</li>
<li>Document time of insertion; maximum dwell time 24 hours</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>All IV medications and fluids can be given IO</li>
<li>IO is the preferred alternative to IV in cardiac arrest</li>
<li>Complications: extravasation (most common), osteomyelitis (rare), compartment syndrome</li>
<li>If resistance felt during drilling → do NOT force; select alternate site</li>
<li>Monitor site frequently for swelling or extravasation</li></ul></div></div>`},

{id:'nasal-atomizer',title:'Nasal Atomizer (MAD — Mucosal Atomization Device)',section:'procedures',
tags:'nasal atomizer MAD intranasal IN medication naloxone midazolam glucagon atomizer mucosal',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Indications / Medications Delivered IN</div><ul>
<li>Naloxone (Narcan) — opioid reversal</li>
<li>Glucagon — hypoglycemia</li>
<li>Midazolam — seizures (where authorized)</li>
<li>Any medication approved for intranasal delivery per local protocol</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Procedure — EMT <span class="ws">W*</span></div><ul>
<li>Draw up medication into syringe per dosing protocol</li>
<li>Attach MAD (mucosal atomization device) to syringe tip</li>
<li>Position patient with head slightly extended</li>
<li>Insert MAD approximately 1 cm into one nostril, angled slightly upward and outward</li>
<li>Briskly compress plunger — deliver approximately 1 mL per nostril maximum (split dose between nostrils if &gt;1 mL)</li>
<li>Hold nostril closed briefly to prevent runoff</li>
<li>If dose exceeds 1 mL per nostril, split between both nostrils or repeat in 3–5 min as indicated</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>Absorption is rapid — nasal mucosa is highly vascular</li>
<li>Less effective with nasal congestion, epistaxis, or recent nasal trauma</li>
<li>Maximum volume per nostril: approximately 1 mL for optimal absorption</li>
<li>Onset slower than IV but faster than IM for most medications</li>
<li>Preferred route in uncooperative patients or when IV/IO access unavailable</li></ul></div></div>`},

{id:'physical-restraint',title:'Physical Restraint',section:'procedures',
tags:'restraint physical soft restraint combative patient behavioral uncooperative Posey wrist',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Indications</div><ul>
<li>Patient poses immediate danger to self or EMS personnel</li>
<li>Patient behavior prevents delivery of necessary medical care</li>
<li>Used in conjunction with law enforcement when appropriate</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Procedure — EMT <span class="ws">W*</span></div><ul>
<li>Use minimum force necessary; attempt verbal de-escalation first</li>
<li>Request law enforcement assistance if available</li>
<li>Use appropriate soft restraints (limb restraints, wrist/ankle restraints, vest)</li>
<li>Restrain in supine or lateral position — NEVER prone (face-down or hog-tied)</li>
<li>Secure all four extremities if needed; do not restrain over wounds or IV sites</li>
<li>Monitor respiratory status, circulation in restrained limbs, and mental status continuously</li>
<li>Document reason for restraint, type of restraint, time applied, and patient status</li>
<li>Reassess and document restraint status every 5 minutes</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>NEVER restrain patient in prone (face-down) or hog-tied position — risk of positional asphyxia is significant</li>
<li>Excited delirium patients are at highest risk of sudden death during or after restraint</li>
<li>Monitor airway, breathing, and circulation continuously</li>
<li>Consider underlying medical/traumatic causes for behavior — do not overlook domestic violence or child abuse</li>
<li>Mechanical patient restraint devices (Posey wrist, ankle, chest) are EMT scope <span class="ws">W*</span></li>
<li>Patient restraint requires documentation and ongoing reassessment</li></ul></div></div>`},

{id:'supraglottic-device',title:'Supraglottic Airway Device (SGA) / I-Gel',section:'procedures',
tags:'SGA supraglottic airway I-gel LMA laryngeal mask airway intubation advanced airway',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Indications</div><ul>
<li>Unconscious patient with absent or inadequate respirations</li>
<li>Airway cannot be maintained by BLS methods (head-tilt/chin-lift, OPA, BVM)</li>
<li>Cardiac arrest requiring definitive airway</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Contraindications</div><ul>
<li>Conscious or semiconscious patient with intact gag reflex</li>
<li>Known esophageal disease or pathology</li>
<li>Ingestion of caustic substances</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Procedure — EMT <span class="wdbl">W**</span></div><ul>
<li>Select appropriate size device (follow manufacturer sizing guide by weight/height)</li>
<li>Pre-oxygenate patient with BVM if possible</li>
<li>Lubricate device if required per manufacturer</li>
<li>Position patient: head in neutral or sniffing position</li>
<li>Open mouth; insert device per manufacturer instructions (typically along hard palate, rotate into position)</li>
<li>Inflate cuff if applicable (e.g., King LT); I-Gel requires no inflation</li>
<li>Confirm placement:<ul>
<li>Bilateral chest rise with ventilation</li>
<li>Bilateral breath sounds; absent epigastric sounds</li>
<li>EtCO₂ waveform if available <span class="ws">W*</span></li>
<li>SpO₂ improving</li></ul></li>
<li>Secure device; continue ventilation at 10–12/min (adult)</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>SGA does NOT prevent aspiration as definitively as endotracheal intubation</li>
<li>EtCO₂ confirmation is preferred over clinical signs alone</li>
<li>If placement unsuccessful after 2 attempts — return to BVM ventilation</li>
<li>Pediatric SGA: size by weight using length-based tape</li>
<li>Continuous monitoring of ventilation adequacy required throughout transport</li></ul></div></div>`},

{id:'taser-dart-removal',title:'Taser Dart Removal',section:'procedures',
tags:'taser dart barbed removal TASER conducted electrical weapon procedure',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">General Guidance</div><ul>
<li>Some agencies treat all barbed darts as foreign bodies — leave for physician removal</li>
<li>Others allow EMS or law enforcement to remove barbed darts EXCEPT from sensitive areas</li>
<li>Follow local protocols, including those of law enforcement for evidence collection and retention</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Do NOT Remove — Physician Removal Required</div><ul>
<li>Darts in head or neck</li>
<li>Darts in hands or feet</li>
<li>Darts in genitals or perineum</li>
<li>Darts embedded deeply in muscle or tissue</li>
<li>Any dart where removal may cause further injury</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Procedure (where authorized by local protocol)</div><ul>
<li>Before removing: ensure cartridge has been removed from the conducted electrical weapon</li>
<li>Stabilize skin around dart insertion site</li>
<li>Grasp dart firmly at the base (where it enters skin)</li>
<li>Pull straight out in one smooth motion — perpendicular to skin</li>
<li>Do NOT twist or angle during removal</li>
<li>Control any bleeding with direct pressure</li>
<li>Preserve dart as evidence — follow law enforcement chain of custody guidance</li>
<li>Dress wound with appropriate bandage</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>Darts are approximately 13 mm long with barbed tips</li>
<li>Up to two single barbed darts may be present if discharged from a distance</li>
<li>Document number of darts found and location of each</li>
<li>Treat associated wounds and assess for additional injuries</li></ul></div></div>`},

{id:'tourniquet-application',title:'Tourniquet Application',section:'procedures',
tags:'tourniquet hemorrhage control limb bleeding extremity CAT SOFT-T commercial tourniquet',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Indications</div><ul>
<li>Life-threatening extremity hemorrhage not controlled by direct pressure</li>
<li>Amputation of limb</li>
<li>Bleeding site amenable to tourniquet placement (extremity — NOT junctional wounds)</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Procedure</div><ul>
<li>Apply directly to BARE SKIN — 2–3 inches proximal to wound, NOT over a joint</li>
<li>Route tail through buckle; pull tight</li>
<li>Twist windlass rod until bleeding stops AND distal pulse is eliminated</li>
<li>Lock windlass in place; secure clip or strap</li>
<li>Mark time of application on tourniquet and document in PCR</li>
<li>If bleeding continues → apply second tourniquet proximal to first</li>
<li>Thigh wounds: consider two tourniquets side-by-side, tighten sequentially</li>
<li>Do NOT cover tourniquet — keep visible for hospital staff</li>
<li>Do NOT loosen or remove tourniquet in the field once applied</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>Survival markedly improved when tourniquet placed BEFORE shock develops</li>
<li>Properly-applied tourniquet on conscious patient is painful — treat with analgesics but do NOT loosen</li>
<li>Tourniquet should be reassessed at every stage of patient movement for ongoing hemorrhage control</li>
<li>Most commercial tourniquets effective for children &gt;2 yr; stretch-wrap-tuck elastic type for any age</li>
<li>Arterial pressure points (brachial, femoral) are NOT effective for controlling hemorrhage but may slow bleeding while tourniquet is applied</li>
<li>Improper application (too loose) may worsen bleeding by occluding venous return without stopping arterial flow</li></ul></div></div>`},

{id:'uncooperative-patients',title:'Uncooperative Patients / Unsecured Scenes Procedure',section:'procedures',
tags:'uncooperative patient unsafe scene refusal AMA behavioral law enforcement staging',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Scene Safety First</div><ul>
<li>If scene is NOT safe → leave and stage; do not enter until law enforcement secures scene</li>
<li>Alert dispatch; request law enforcement if not already en route</li>
<li>Document scene conditions and reason for delayed patient contact</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Approaching the Uncooperative Patient</div><ul>
<li>Approach calmly; identify yourself and your role</li>
<li>Use calm, non-threatening voice and body language; maintain safe distance</li>
<li>Explain what you are doing and why</li>
<li>Listen to patient concerns; acknowledge their feelings</li>
<li>Avoid arguing or challenging the patient</li>
<li>Request law enforcement assistance for physical restraint if patient is dangerous</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Patient Refusing Care / AMA</div><ul>
<li>Assess patient's decision-making capacity:<ul>
<li>Patient understands the situation and condition</li>
<li>Patient understands the risks of refusing care/transport</li>
<li>Patient can communicate their wishes</li>
<li>Patient's decision is not based solely on intoxication or altered mental status</li></ul></li>
<li>Inform patient of potential consequences of refusal in clear terms</li>
<li>Offer alternatives (treatment without transport, alternative transport)</li>
<li>If patient has decision-making capacity and refuses → document thoroughly and have patient sign refusal form if possible</li>
<li>Contact online medical control if unsure about patient's capacity</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>Never leave a patient who has altered mental status, intoxication, or serious illness without medical evaluation</li>
<li>Minors cannot refuse care without parent/guardian consent (exceptions: emancipated minors)</li>
<li>Document ALL refusals thoroughly: patient statements, mental status assessment, risks explained, alternatives offered</li>
<li>When in doubt, contact online medical control</li>
<li>Consider domestic violence or human trafficking in behavioral calls — question patient privately away from companions</li></ul></div></div>`},
{id:'med-activated-charcoal',title:'Activated Charcoal',section:'medications',
tags:'activated charcoal overdose ingestion poisoning toxicology adsorption',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>Adsorbent — binds to many substances in GI tract, preventing absorption</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Indications / Contraindications</div><ul>
<li><strong>Indications:</strong> Ingestion within ONE HOUR of EMS arrival; oral poisoning/overdose</li>
<li><strong>Contraindications:</strong> Altered mental status or inability to protect airway; ingestion of acids, alkalis, or hydrocarbons; no gag reflex</li>
<li><span class="ws">W*</span> Recommend contacting Poison Control prior to administration: <strong>1-800-709-0911</strong></li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Dosing</div>
<table class="dose-table"><thead><tr><th>Patient</th><th>Dose</th><th>Route</th></tr></thead><tbody>
<tr><td>Adult</td><td>50 g PO</td><td>Oral (mixed with water)</td></tr>
<tr><td>Pediatric</td><td>1 g/kg PO (min 10 g, max 50 g)</td><td>Oral</td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Notes</div><ul>
<li>Most effective within 1 hour of ingestion; less effective as time increases</li>
<li>Does NOT bind: iron, lithium, alcohols, acids, alkalis, hydrocarbons, cyanide</li>
<li>May cause vomiting — ensure airway protection</li>
<li>EMT scope: <span class="ws">W*</span></li></ul></div></div>`},

{id:'med-acetaminophen',title:'Acetaminophen (Tylenol)',section:'medications',
tags:'acetaminophen tylenol paracetamol fever pain analgesic antipyretic',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>Analgesic / Antipyretic — central mechanism; does not have significant anti-inflammatory effect</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Indications / Contraindications</div><ul>
<li><strong>Indications:</strong> Pain management; fever reduction (temp &gt;101°F in pediatric patients)</li>
<li><strong>Contraindications:</strong> Known hepatic disease or liver failure; allergy to acetaminophen; max dose already given within 4 hours</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Dosing</div>
<table class="dose-table"><thead><tr><th>Patient</th><th>Dose</th><th>Route</th><th>Max</th></tr></thead><tbody>
<tr><td>Adult</td><td>15 mg/kg PO</td><td>PO</td><td>1 g single dose</td></tr>
<tr><td>Pediatric</td><td>15 mg/kg PO</td><td>PO or PR (suppository)</td><td>Per weight</td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Notes</div><ul>
<li>EMT scope: <span class="ws">W*</span></li>
<li>Onset: 30–60 min PO; Duration: 4–6 hours</li>
<li>Rectal suppository if child unable to swallow or protect airway</li>
<li>For febrile seizures: if child &gt;6 months with max acetaminophen dose &lt;4 hr ago and temp &gt;101°F, may consider ibuprofen instead</li></ul></div></div>`},

{id:'med-albuterol',title:'Albuterol (Proventil / Ventolin)',section:'medications',
tags:'albuterol proventil ventolin bronchodilator beta agonist asthma COPD wheeze nebulizer MDI',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>Beta₂ Agonist / Bronchodilator — relaxes bronchial smooth muscle; also used in hyperkalemia</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Indications / Contraindications</div><ul>
<li><strong>Indications:</strong> Bronchospasm (asthma, COPD); wheezing; anaphylaxis with wheezing; reactive airway disease</li>
<li><strong>Contraindications:</strong> Hypersensitivity to albuterol; tachyarrhythmias</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Dosing</div>
<table class="dose-table"><thead><tr><th>Patient</th><th>Dose</th><th>Route</th></tr></thead><tbody>
<tr><td>Adult</td><td>2.5 mg in 3.0 mL NS via nebulizer; may repeat PRN</td><td>Nebulizer or MDI</td></tr>
<tr><td>Peds &lt;15 kg</td><td>2.5–5 mg via nebulizer</td><td>Nebulizer (blow-by if &lt;5 yr)</td></tr>
<tr><td>Peds &gt;15 kg</td><td>5–10 mg via nebulizer</td><td>Nebulizer</td></tr>
<tr><td>Continuous (peds)</td><td>2.5 mg in 3 mL for patients &lt;5 yr</td><td>Nebulizer, continuous</td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Notes</div><ul>
<li>EMT scope: <span class="ws">W*</span> (nebulizer/MDI); MDI assist EMR scope</li>
<li>Onset: 5 min; Duration: 3–6 hours</li>
<li>Side effects: tachycardia, tremors, hypokalemia, palpitations</li>
<li>Often combined with Atrovent/Ipratropium (DuoNeb) for synergistic effect</li></ul></div></div>`},

{id:'med-aspirin',title:'Aspirin (Acetylsalicylic Acid)',section:'medications',
tags:'aspirin ASA acetylsalicylic acid ACS STEMI MI chest pain antiplatelet',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>Antiplatelet agent / NSAID — irreversibly inhibits COX-1, reducing thromboxane A₂-mediated platelet aggregation</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Indications / Contraindications</div><ul>
<li><strong>Indications:</strong> Suspected ACS/MI/STEMI; chest pain of suspected cardiac origin</li>
<li><strong>Contraindications:</strong> Known allergy to aspirin or NSAIDs; active GI bleeding; hemorrhagic stroke; age &lt;16 (Reye syndrome risk)</li>
<li><strong>Use caution:</strong> Asthma (may precipitate bronchospasm); recent GI bleed</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Dosing</div>
<table class="dose-table"><thead><tr><th>Indication</th><th>Dose</th><th>Route</th></tr></thead><tbody>
<tr><td>ACS / Chest Pain</td><td>324 mg (typically 4 × 81 mg chewable)</td><td>PO (chew, do not swallow whole)</td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Notes</div><ul>
<li>EMR scope: <span class="ws">W*</span></li>
<li>Patient should CHEW aspirin for fastest absorption</li>
<li>Do NOT delay administration for IV access</li>
<li>If patient has already taken aspirin today, still administer (total 324 mg if possible)</li></ul></div></div>`},

{id:'med-epinephrine',title:'Epinephrine (Adrenaline)',section:'medications',
tags:'epinephrine adrenaline epipen auto injector anaphylaxis cardiac arrest bronchospasm vasopressor',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>Sympathomimetic — alpha + beta agonist; causes vasoconstriction, increased HR/contractility, bronchodilation</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Indications</div><ul>
<li>Anaphylaxis / severe allergic reaction</li>
<li>Cardiac arrest (AEMT scope)</li>
<li>Bronchospasm unresponsive to albuterol</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Dosing</div>
<table class="dose-table"><thead><tr><th>Indication</th><th>Dose</th><th>Concentration</th><th>Route</th></tr></thead><tbody>
<tr><td>Anaphylaxis Adult (EMT)</td><td>0.3 mg IM outer thigh; repeat ×1 after 5 min if needed</td><td>1 mg/mL</td><td>IM <span class="ws">W*</span></td></tr>
<tr><td>Anaphylaxis Peds (EMT)</td><td>0.01 mg/kg IM (max 0.3 mg) or 0.15 mg auto-injector</td><td>1 mg/mL</td><td>IM <span class="ws">W*</span></td></tr>
<tr><td>Anaphylaxis Adult (AEMT)</td><td>0.3 mg IM</td><td>1 mg/mL</td><td>IM</td></tr>
<tr><td>Cardiac Arrest Adult (AEMT)</td><td>1 mg IV/IO q 3–5 min</td><td>1 mg/10 mL (1:10,000) <span class="ws">W*</span></td><td>IV/IO</td></tr>
<tr><td>Cardiac Arrest Peds (AEMT)</td><td>0.01 mg/kg IV/IO</td><td>1:10,000 <span class="ws">W*</span></td><td>IV/IO</td></tr>
<tr><td>Auto-Injector (EMR)</td><td>Per manufacturer — adult or pediatric</td><td>—</td><td>Outer thigh IM</td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Notes</div><ul>
<li>Avoid injection in affected extremity in bites/stings when possible</li>
<li>Side effects: tachycardia, hypertension, anxiety, tremors, palpitations</li>
<li>Epi 1:1,000 = 1 mg/mL (IM use); Epi 1:10,000 = 0.1 mg/mL (IV/IO use)</li></ul></div></div>`},

{id:'med-naloxone',title:'Naloxone (Narcan)',section:'medications',
tags:'naloxone narcan opioid reversal overdose narcotic heroin fentanyl respiratory depression IN IM IV',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>Opioid antagonist — competitively displaces opioids from mu receptors; reverses respiratory depression, sedation, analgesia</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Indications / Contraindications</div><ul>
<li><strong>Indications:</strong> Suspected opioid overdose with respiratory depression; altered mental status with possible opioid use</li>
<li><strong>Contraindications:</strong> Known hypersensitivity; do NOT give to newborns</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Dosing</div>
<table class="dose-table"><thead><tr><th>Level</th><th>Patient</th><th>Dose</th><th>Route</th></tr></thead><tbody>
<tr><td>EMR</td><td>Adult</td><td>0.4–4 mg IN; repeat q2–3 min up to 10 mg</td><td>IN (nasal atomizer)</td></tr>
<tr><td>EMR</td><td>Pediatric</td><td>0.1 mg/kg IN (max 2 mg/dose); q2–3 min up to 10 mg</td><td>IN</td></tr>
<tr><td>EMT <span class="ws">W*</span></td><td>Adult</td><td>0.4–4 mg IM; repeat q2–3 min up to 10 mg</td><td>IM</td></tr>
<tr><td>EMT <span class="ws">W*</span></td><td>Pediatric</td><td>0.1 mg/kg IM (max 2 mg/dose) up to 10 mg</td><td>IM</td></tr>
<tr><td>AEMT</td><td>Adult</td><td>0.4–2 mg IV/IO; repeat q2–3 min, max 10 mg</td><td>IV/IO</td></tr>
<tr><td>AEMT</td><td>Pediatric</td><td>0.1 mg/kg IV q2–3 min; max 2 mg/dose; max 10 mg total</td><td>IV</td></tr>
<tr><td>Respiratory Distress (EMR)</td><td>Adult</td><td>2.0 mg IN (if cause unknown or narcotics possible)</td><td>IN</td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Notes</div><ul>
<li>Duration of action (30–60 min) may be SHORTER than the opioid — patient can re-sedate; monitor continuously</li>
<li>High-potency opioids (fentanyl, carfentanil) may require multiple doses</li>
<li>If narcotic OD/hypoglycemia suspected, administer Narcan/Glucose PRIOR to SGA</li>
<li>Do NOT give to newborns during initial resuscitation</li>
<li>Withdrawal precipitated by Narcan can cause agitation, vomiting, acute pain — be prepared</li></ul></div></div>`},

{id:'med-nitroglycerin',title:'Nitroglycerin (NTG)',section:'medications',
tags:'nitroglycerin nitro NTG sublingual chest pain ACS angina vasodilator cardiac',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>Nitrate / Vasodilator — relaxes vascular smooth muscle; reduces preload and myocardial oxygen demand; dilates coronary arteries</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Indications / Contraindications</div><ul>
<li><strong>Indications:</strong> Chest pain of suspected cardiac origin; acute pulmonary edema (AEMT)</li>
<li><strong>Contraindications:</strong> SBP &lt;100 mmHg; use of Viagra/Cialis/Levitra (sildenafil/tadalafil/vardenafil) within 24–48 hours; RV infarction; hypersensitivity to nitrates</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Dosing</div>
<table class="dose-table"><thead><tr><th>Level</th><th>Dose</th><th>Route</th><th>Repeat</th></tr></thead><tbody>
<tr><td>EMT <span class="ws">W*</span> (patient's own)</td><td>0.4 mg SL</td><td>Sublingual tablet or spray</td><td>May repeat ×2 every 3–5 min if SBP &gt;100</td></tr>
<tr><td>AEMT</td><td>0.4 mg SL</td><td>Sublingual</td><td>Repeat ×2 every 3–5 min OR Nitro Paste 1 inch to chest wall</td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Notes</div><ul>
<li>Obtain IV/IO access BEFORE NTG administration (EMT w/ IV endorsement)</li>
<li>Check BP before each dose — hold if SBP &lt;100 mmHg</li>
<li>Side effects: headache, hypotension, tachycardia, dizziness</li>
<li>Ask specifically about erectile dysfunction medications — combination causes life-threatening hypotension</li></ul></div></div>`},

{id:'med-ondansetron',title:'Ondansetron (Zofran)',section:'medications',
tags:'ondansetron zofran antiemetic nausea vomiting ODT sublingual serotonin antagonist',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>Serotonin (5-HT₃) antagonist / Antiemetic — blocks serotonin receptors in GI tract and CNS</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Indications / Contraindications</div><ul>
<li><strong>Indications:</strong> Nausea and vomiting</li>
<li><strong>Contraindications:</strong> Known hypersensitivity; caution with QT prolongation risk</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Dosing</div>
<table class="dose-table"><thead><tr><th>Level</th><th>Patient</th><th>Dose</th><th>Route</th></tr></thead><tbody>
<tr><td>EMT <span class="ws">W*</span></td><td>Adult</td><td>4–8 mg SL ODT</td><td>Sublingual dissolving tablet</td></tr>
<tr><td>EMT <span class="ws">W*</span></td><td>Peds 1–5 yr</td><td>2 mg SL</td><td>Sublingual</td></tr>
<tr><td>EMT <span class="ws">W*</span></td><td>Peds ≥6 yr</td><td>4 mg ODT</td><td>Sublingual dissolving tablet</td></tr>
<tr><td>AEMT</td><td>Adult</td><td>4 mg IM/IV</td><td>IM or IV</td></tr>
<tr><td>AEMT</td><td>Peds 1–5 yr</td><td>2 mg SL</td><td>Sublingual</td></tr>
<tr><td>AEMT</td><td>Peds ≥6 yr</td><td>4 mg ODT</td><td>Sublingual</td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Notes</div><ul>
<li>Onset: 30 min (PO/SL); 5–10 min (IV); Duration: 4–8 hours</li>
<li>May cause headache, constipation, dizziness</li>
<li>PO also authorized for EMT scope: <span class="ws">W*</span></li></ul></div></div>`},

{id:'med-diphenhydramine',title:'Diphenhydramine (Benadryl)',section:'medications',
tags:'diphenhydramine benadryl antihistamine allergic reaction anaphylaxis dystonic reaction H1 blocker',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>H1 Antihistamine / Anticholinergic — blocks histamine receptors; also has sedative and antiemetic properties</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Indications / Contraindications</div><ul>
<li><strong>Indications:</strong> Allergic reaction / anaphylaxis (adjunct to epinephrine); dystonic reactions / phenothiazine reactions</li>
<li><strong>Contraindications:</strong> Hypersensitivity; narrow-angle glaucoma; lower respiratory disease (may thicken secretions)</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Dosing</div>
<table class="dose-table"><thead><tr><th>Level</th><th>Patient</th><th>Dose</th><th>Route</th><th>Max</th></tr></thead><tbody>
<tr><td>EMT <span class="ws">W*</span></td><td>Adult</td><td>50 mg PO</td><td>PO</td><td>50 mg</td></tr>
<tr><td>EMT <span class="ws">W*</span></td><td>Pediatric</td><td>1 mg/kg PO (up to 25 mg)</td><td>PO</td><td>25 mg</td></tr>
<tr><td>AEMT</td><td>Adult</td><td>1 mg/kg IV (IM if no IV)</td><td>IV/IM/PO</td><td>50 mg</td></tr>
<tr><td>AEMT</td><td>Pediatric</td><td>1 mg/kg IV/IM</td><td>IV/IM</td><td>50 mg</td></tr>
<tr><td>Dystonic (EMT w/IV)</td><td>Adult</td><td>12.5–50 mg IV/IM</td><td>IV/IM</td><td>50 mg</td></tr>
<tr><td>Dystonic (EMT w/IV)</td><td>Pediatric</td><td>1 mg/kg IM</td><td>IM</td><td>25 mg</td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Notes</div><ul>
<li>Epinephrine is FIRST-LINE for anaphylaxis — diphenhydramine is adjunct only</li>
<li>Side effects: sedation, anticholinergic effects (dry mouth, urinary retention, tachycardia)</li>
<li>Onset: 15–30 min PO; 5 min IV; Duration: 4–6 hours</li></ul></div></div>`},

{id:'med-ibuprofen',title:'Ibuprofen',section:'medications',
