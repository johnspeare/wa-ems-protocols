<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d47a1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WA Protocols">
<meta name="description" content="Washington State 2024 BLS/ILS Protocol Guidance — EMR, EMT, AEMT">
<title>WA BLS/ILS 2024</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="512x512" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<style>
:root{
  --med:#1565c0;--tra:#c62828;--pro:#6a1b9a;--meds:#2e7d32;--adm:#455a64;
  --emr:#546e7a;--emt:#1565c0;--aemt:#6a1b9a;--sga:#00695c;--iv:#e65100;--con:#37474f;
  --als:#e65100;
  --bg:#f0f4f8;--card:#fff;--txt:#1a1a2e;--txt2:#546e7a;--bdr:#dde3ec;
  --hdr:#0d47a1;--hdr-txt:#fff;
  --radius:12px;--shadow:0 2px 8px rgba(0,0,0,.1);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0d1117;--card:#161b27;--txt:#e8eaf6;--txt2:#8fa3b1;--bdr:#2a3240;
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--txt);min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom)}

/* ── Header ── */
#hdr{
  position:sticky;top:0;z-index:100;
  background:var(--hdr);color:var(--hdr-txt);
  padding:env(safe-area-inset-top) 0 0;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.hdr-top{display:flex;align-items:center;gap:10px;padding:10px 14px 8px}
.app-icon{font-size:28px;line-height:1}
.app-name{font-size:17px;font-weight:700;line-height:1.1}
.app-sub{font-size:11px;opacity:.75;margin-top:1px}

/* Search */
.search-wrap{display:flex;align-items:center;gap:0;
  background:#fff;border-radius:10px;overflow:hidden;
  margin:0 14px 8px;box-shadow:0 1px 4px rgba(0,0,0,.15)}
#search{
  flex:1;border:none;outline:none;padding:10px 12px;
  font-size:16px;background:transparent;color:#1a1a2e;
  -webkit-appearance:none}
#search::placeholder{color:#90a4ae}
#sclear{border:none;background:none;padding:0 12px;font-size:18px;
  color:#90a4ae;cursor:pointer;line-height:1}

/* Filter tabs */
.tabs{display:flex;overflow-x:auto;gap:6px;padding:0 14px 6px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;border:none;border-radius:20px;padding:5px 14px;
  font-size:13px;font-weight:600;cursor:pointer;
  background:rgba(255,255,255,.15);color:rgba(255,255,255,.85);
  transition:background .15s,color .15s}
.tab.active,.tab:active{background:#fff;color:#0d47a1}


/* Quick-access row */
#quick{
  display:flex;overflow-x:auto;gap:8px;padding:10px 14px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;background:var(--card);
  border-bottom:1px solid var(--bdr)}
#quick::-webkit-scrollbar{display:none}
.qbtn{
  flex-shrink:0;border:none;border-radius:8px;padding:7px 13px;
  font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.3px;
  transition:opacity .1s}
.qbtn:active{opacity:.7}
.q-cardiac{background:#c62828;color:#fff}
.q-stroke{background:#6a1b9a;color:#fff}
.q-ana{background:#e65100;color:#fff}
.q-chest{background:#1565c0;color:#fff}
.q-od{background:#2e7d32;color:#fff}
.q-trauma{background:#4e342e;color:#fff}
.q-airway{background:#00695c;color:#fff}
.q-diabetic{background:#f57f17;color:#fff}

/* ── Card list ── */
#list{
  display:grid;gap:10px;padding:12px 14px;
  grid-template-columns:1fr}
@media(min-width:600px){#list{grid-template-columns:1fr 1fr}}
@media(min-width:1000px){#list{grid-template-columns:1fr 1fr 1fr;max-width:1100px;margin:0 auto}}

.card{
  background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);border:1px solid var(--bdr);
  overflow:hidden;cursor:pointer;transition:transform .1s,box-shadow .1s;
  -webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.98);box-shadow:0 1px 4px rgba(0,0,0,.08)}

.card-hdr{padding:10px 14px 8px;display:flex;align-items:center;gap:8px}
.sec-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.card-title{font-size:15px;font-weight:700;flex:1;line-height:1.2}
.card-title mark{background:#fff59d;color:#000;border-radius:2px;padding:0 1px}
.sec-badge{
  font-size:10px;font-weight:800;letter-spacing:.5px;
  padding:2px 7px;border-radius:10px;color:#fff;flex-shrink:0}

/* section colors */
.c-medical .card-hdr{border-left:4px solid var(--med)}
.c-medical .sec-dot{background:var(--med)}
.c-medical .sec-badge{background:var(--med)}
.c-trauma .card-hdr{border-left:4px solid var(--tra)}
.c-trauma .sec-dot{background:var(--tra)}
.c-trauma .sec-badge{background:var(--tra)}
.c-procedures .card-hdr{border-left:4px solid var(--pro)}
.c-procedures .sec-dot{background:var(--pro)}
.c-procedures .sec-badge{background:var(--pro)}
.c-medications .card-hdr{border-left:4px solid var(--meds)}
.c-medications .sec-dot{background:var(--meds)}
.c-medications .sec-badge{background:var(--meds)}
.c-admin .card-hdr{border-left:4px solid var(--adm)}
.c-admin .sec-dot{background:var(--adm)}
.c-admin .sec-badge{background:var(--adm)}

.card-tags{display:flex;flex-wrap:wrap;gap:4px;padding:0 14px 10px}
.tag{font-size:11px;padding:2px 7px;border-radius:10px;
  background:var(--bg);color:var(--txt2);border:1px solid var(--bdr)}
.mlink{color:inherit;text-decoration:underline;text-decoration-style:dotted;
  text-underline-offset:2px;cursor:pointer;font-weight:inherit}

.no-results{padding:40px 20px;text-align:center;color:var(--txt2);font-size:16px}

/* ── Modal / Detail view ── */
#modal{
  position:fixed;inset:0;z-index:200;
  background:var(--bg);overflow-y:auto;
  transform:translateX(100%);transition:transform .25s ease;
  -webkit-overflow-scrolling:touch}
#modal:not([hidden]){transform:translateX(0)}
#modal[hidden]{display:block!important;pointer-events:none}

.modal-hdr{
  position:sticky;top:0;z-index:10;
  background:var(--hdr);color:#fff;
  padding:env(safe-area-inset-top) 14px 10px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.2)}
#back-btn{
  border:none;background:none;color:#fff;font-size:22px;
  cursor:pointer;padding:4px 8px 4px 0;line-height:1;flex-shrink:0}
#modal-title{font-size:16px;font-weight:700;flex:1;line-height:1.2}
#modal-badge{
  font-size:10px;font-weight:800;letter-spacing:.5px;
  padding:2px 8px;border-radius:10px;color:#fff;flex-shrink:0}

.modal-body{padding:14px}

/* ── Protocol content styles ── */
.als-note{
  background:#fff3e0;border:1px solid #ffb74d;color:#bf360c;
  border-radius:8px;padding:8px 12px;margin-bottom:12px;
  font-size:12px;font-weight:600;display:flex;gap:6px;align-items:flex-start}
@media(prefers-color-scheme:dark){
  .als-note{background:#2d1a00;border-color:#8d4a00;color:#ffb74d}}

/* Assessment grid */
.assess{
  display:grid;gap:8px;margin-bottom:12px;
  grid-template-columns:1fr}
@media(min-width:480px){.assess{grid-template-columns:1fr 1fr 1fr}}
.assess-col{
  background:var(--card);border-radius:8px;border:1px solid var(--bdr);overflow:hidden}
.assess-head{
  font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  padding:6px 10px;background:var(--bg);border-bottom:1px solid var(--bdr);color:var(--txt2)}
.assess-col ul{padding:8px 10px 8px 24px;font-size:13px;line-height:1.5}
.assess-col li{padding:1px 0}
.assess-col li.b{font-weight:700;color:var(--txt)}
.sample-note{font-size:12px;font-weight:700;color:var(--txt2);
  padding:6px 10px 2px;font-style:italic}

/* Management levels */
.mgmt{display:flex;flex-direction:column;gap:8px}
.lv{border-radius:8px;border:1px solid var(--bdr);overflow:hidden}
.lv-tag{
  font-size:12px;font-weight:800;letter-spacing:.4px;
  padding:6px 12px;display:flex;align-items:center;gap:6px}
.lv ul{padding:8px 12px 10px 28px;font-size:13px;line-height:1.6}
.lv li{padding:1px 0}
.lv ul ul{margin-top:2px;padding-left:16px;font-size:12px;color:var(--txt2)}

/* Level colors */
.emr-lv{border-color:#78909c}.emr-tag{background:#eceff1;color:#37474f}
.emt-lv{border-color:#90caf9}.emt-tag{background:#e3f2fd;color:#0d47a1}
.sga-lv{border-color:#80cbc4}.sga-tag{background:#e0f2f1;color:#004d40}
.iv-lv{border-color:#ffb74d}.iv-tag{background:#fff8e1;color:#e65100}
.aemt-lv{border-color:#ce93d8}.aemt-tag{background:#f3e5f5;color:#4a148c}
.consider-lv{border-color:#a5d6a7}.consider-tag{background:#e8f5e9;color:#1b5e20}
.peds-lv{border-color:#f48fb1}.peds-tag{background:#fce4ec;color:#880e4f}
.transport-lv{border-color:#90a4ae}.transport-tag{background:#eceff1;color:#37474f}

@media(prefers-color-scheme:dark){
  .emr-tag{background:#1c2830;color:#90a4ae}
  .emt-tag{background:#0a1929;color:#90caf9}
  .sga-tag{background:#00251a;color:#80cbc4}
  .iv-tag{background:#2d1a00;color:#ffb74d}
  .aemt-tag{background:#1a0030;color:#ce93d8}
  .consider-tag{background:#0a1f0a;color:#a5d6a7}
  .peds-tag{background:#2d0016;color:#f48fb1}
  .transport-tag{background:#1c2830;color:#90a4ae}
}

/* W* badges */
.ws{display:inline-block;background:#e65100;color:#fff;
  font-size:10px;font-weight:800;padding:1px 5px;border-radius:4px;
  margin-right:4px;vertical-align:middle;letter-spacing:.3px}
.wdbl{display:inline-block;background:#4a148c;color:#fff;
  font-size:10px;font-weight:800;padding:1px 5px;border-radius:4px;
  margin-right:4px;vertical-align:middle;letter-spacing:.3px}

/* Misc content */
.proto-note{
  background:var(--bg);border-left:3px solid var(--als);
  padding:8px 12px;border-radius:0 8px 8px 0;
  font-size:13px;margin-bottom:8px;color:var(--txt)}
.dose-table{width:100%;border-collapse:collapse;font-size:13px;margin:6px 0}
.dose-table th{background:var(--bg);padding:5px 8px;text-align:left;
  font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--txt2)}
.dose-table td{padding:5px 8px;border-top:1px solid var(--bdr)}
.dose-table tr:nth-child(even) td{background:var(--bg)}
h5.subsect{font-size:12px;font-weight:800;text-transform:uppercase;
  letter-spacing:.5px;color:var(--txt2);margin:10px 0 4px}

/* Back to top */
#topbtn{
  position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));right:16px;
  z-index:150;width:44px;height:44px;border-radius:50%;
  background:var(--hdr);color:#fff;border:none;font-size:20px;
  cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center}
#topbtn[hidden]{display:none}
</style>
</head>
<body>

<div id="hdr">
  <div class="hdr-top">
    <div class="app-icon">🚑</div>
    <div>
      <div class="app-name">WA BLS/ILS Protocols</div>
      <div class="app-sub">2024 · EMR · EMT · AEMT · DOH 530-281</div>
    </div>
  </div>
  <div class="search-wrap">
    <input id="search" type="search" placeholder="Search protocols, meds, symptoms…"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="sclear" hidden aria-label="Clear">✕</button>
  </div>
  <div class="tabs">
    <button class="tab active" data-s="all">All</button>
    <button class="tab" data-s="medical">Medical</button>
    <button class="tab" data-s="trauma">Trauma</button>
    <button class="tab" data-s="procedures">Procedures</button>
    <button class="tab" data-s="medications">Medications</button>
    <button class="tab" data-s="admin">Admin</button>
  </div>
</div>

<div id="quick">
  <button class="qbtn q-cardiac" data-goto="cardiac-arrest-adult">🫀 Cardiac Arrest</button>
  <button class="qbtn q-stroke" data-goto="stroke">🧠 Stroke</button>
  <button class="qbtn q-ana" data-goto="anaphylaxis">⚠️ Anaphylaxis</button>
  <button class="qbtn q-chest" data-goto="chest-pain">💔 Chest Pain/ACS</button>
  <button class="qbtn q-od" data-goto="overdose">💊 Overdose</button>
  <button class="qbtn q-trauma" data-goto="trauma-general">🩹 Gen Trauma</button>
  <button class="qbtn q-airway" data-goto="respiratory-distress">🫁 Airway/Resp</button>
  <button class="qbtn q-diabetic" data-goto="diabetic-emergency">🩸 Diabetic</button>
</div>

<div id="list"></div>

<!-- Detail overlay -->
<div id="modal" hidden>
  <div class="modal-hdr">
    <button id="back-btn" onclick="closeModal()">&#8592;</button>
    <div id="modal-title"></div>
    <div id="modal-badge"></div>
  </div>
  <div class="modal-body" id="modal-body"></div>
</div>

<button id="topbtn" hidden aria-label="Back to top">↑</button>

<script>
/* ── Protocol data ── */
const PROTOCOLS = [
// PROTOCOLS_START
{id:'universal-patient-care',title:'Universal Patient Care Protocol',section:'admin',
tags:'UPC scene safety BSI airway breathing circulation assessment vitals oxygen transport',
body:`<div class="proto-note">⚑ Referenced by every protocol — initiate first on all patients.</div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">ALL LEVELS — Sequential Steps</div><ul>
<li><strong>Scene Safety / BSI</strong> — safe scene, appropriate PPE</li>
<li><strong>MOI / NOI</strong> — mechanism of injury or nature of illness</li>
<li><strong>Primary Assessment (ABCDE)</strong><ul>
<li>A — Airway: open, maintain, protect</li>
<li>B — Breathing: rate, quality; O₂ to maintain SpO₂ 94–99%</li>
<li>C — Circulation: pulse rate/quality, skin, hemorrhage control</li>
<li>D — Disability: LOC (<a class="mlink" onclick="openProto('mnemonics');return false;" href="#">AVPU</a>/GCS), pupils, blood glucose <span class="ws">W*</span></li>
<li>E — Expose / Environment: full exam, prevent hypothermia</li></ul></li>
<li><strong>Vital Signs</strong> — BP, HR, RR, SpO₂, temp, glucose as indicated</li>
<li><strong>Transport Decision</strong> — priority, destination per local protocols</li>
<li><strong>Secondary Assessment</strong> — SAMPLE, OPQRST, head-to-toe en route</li>
<li><strong>Reassess</strong> — unstable: q5 min; stable: q15 min</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Principles</div><ul>
<li>If protocols do not cover the situation, consult online medical control</li>
<li>Always do what is right for the patient within your scope of practice</li>
<li>Document all findings, interventions, and patient responses on PCR</li></ul></div></div>`},

{id:'withholding-resuscitation',title:'Withholding / Terminating Resuscitation',section:'admin',
tags:'DNR POLST living will terminate withhold resuscitation CPR death irreversible',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Withhold — Signs of Irreversible Death (ANY one sufficient)</div><ul>
<li>Rigor mortis &nbsp;|&nbsp; Incineration &nbsp;|&nbsp; Decomposition &nbsp;|&nbsp; Decapitation</li>
<li>Lividity &nbsp;|&nbsp; Evisceration of the heart</li>
<li>External brain matter with absence of vital signs</li>
<li>CPR would place rescuer at risk of serious injury or mortal peril</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Terminate — Medical Cardiac Arrest</div><ul>
<li>&gt;40 min high-quality CPR: witnessed collapse OR remains in shockable rhythm</li>
<li>&gt;25 min high-quality CPR: unwitnessed arrest, non-shockable rhythm</li>
<li>EtCO₂ may monitor CPR effectiveness (if available)</li>
<li><strong>Transport with CPR if:</strong> drug OD, drowning, hypothermia, refractory shockable rhythm, age ≤30, lightning strike, or circumstances require transport</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Trauma Cardiac Arrest</div><ul>
<li>May withhold if pulseless, apneic, no witnessed signs of life on EMS arrival</li>
<li>Pediatric: consider contacting online medical control</li></ul></div>
<div class="lv aemt-lv"><div class="lv-tag aemt-tag">Advanced Directives</div><ul>
<li>POLST "Comfort-Focused Treatment" → do not initiate full resuscitation</li>
<li>Living will should be honored if present</li>
<li>Compelling reasons to withhold: terminal condition AND patient expressed no resuscitation wish</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Documentation Required</div><ul>
<li>Contact online medical control before terminating efforts</li>
<li>Notify Medical Examiner (ME) and/or Law Enforcement (LE)</li>
<li>All documentation on PCR; copy to ME's office</li></ul></div></div>`},

{id:'abdominal-pain',title:'Abdominal / Back / Flank Pain (Non-Traumatic)',section:'medical',
tags:'abdominal back flank pain AAA appendicitis bowel ectopic pregnancy GI kidney stones nausea',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Allergies, medications</li><li>Past medical/surgical history</li>
<li>Last meal; last bowel movement/emesis</li>
<li>Onset, Palliation/Provocation</li><li>Quality (crampy, constant, sharp)</li>
<li>Region / Radiation / Referred</li><li>Severity (1–10); Time</li>
<li>Menstrual history / pregnancy</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li class="b">Abnormal vital signs</li><li class="b">Chest pain</li>
<li>Constipation; Diarrhea; Dysuria</li><li>Fever; Nausea</li>
<li>Pain (location/migration)</li><li class="b">Pregnancy</li>
<li class="b">Pulsating mass</li><li class="b">Shortness of breath</li>
<li>Tenderness; Vomiting</li><li class="b">Vaginal bleeding</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>AAA; Appendicitis</li><li>Bowel obstruction</li>
<li>Cardiac (MI); Cholecystitis</li><li>Diverticulitis</li>
<li>Ectopic pregnancy; GI bleed</li><li>Kidney stones / infection</li>
<li>Pancreatitis; Pregnancy (ectopic?)</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Position of comfort</li>
<li>SBP &lt;90 mmHg → treat per Shock/Hypotension protocol; consider rapid transport</li>
<li>Do not allow patient to eat or drink</li>
<li>Treat nausea/vomiting per Nausea/Vomiting protocol</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Consider ECG / 12-lead if available</li>
<li>Treat pain per Pain Management protocol</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li></ul></div>
<div class="lv peds-lv"><div class="lv-tag peds-tag">Pediatric Considerations</div><ul>
<li>Consider non-accidental trauma</li>
<li>Monitor closely — BP may drop quickly; treat per Shock/Hypotension if indicated</li>
<li>Lowest normal pediatric SBP: &lt;1 mo &gt;60 mmHg; 1 mo–1 yr &gt;70 mmHg; &gt;1 yr: 70 + (2 × age in years)</li></ul></div></div>`},

{id:'anaphylaxis',title:'Allergic Reaction / Anaphylaxis',section:'medical',
tags:'anaphylaxis allergic reaction epinephrine epi hives angioedema stridor shock benadryl albuterol diphenhydramine',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>History of anaphylaxis</li><li>Prescribed / use of EpiPen</li>
<li>Known allergy / exposure (insect sting, bite)</li>
<li>New clothing, soap, detergent</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li class="b">Altered Mental Status</li>
<li class="b">Angioedema, hoarseness, difficulty swallowing</li>
<li>Anxiety; Diaphoresis; Hives</li>
<li class="b">Hypotension / Shock</li>
<li>Itching / Rash; Nausea/vomiting/diarrhea; Pale</li>
<li class="b">Shortness of breath, wheezing, stridor, hypoxia</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>Asthma or COPD</li><li>Aspiration / airway obstruction</li>
<li>Angioedema (drug-induced: lisinopril)</li><li>Anxiety</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Assess for signs/symptoms of allergic reaction</li>
<li>Severe reaction with ANGIOEDEMA/STRIDOR and/or Shock → Epinephrine Auto-Injector per manufacturer guidelines (adult/pediatric)</li>
<li><span class="ws">W*</span> Allergic reaction WITH WHEEZING → assist patient in administering own MDI</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li><strong>Adult:</strong><ul>
<li><span class="ws">W*</span> Epi 1 mg/mL — 0.3 mg IM outer thigh; may repeat ×1 after 5 min</li>
<li><span class="ws">W*</span> Diphenhydramine 50 mg PO OR Cetirizine 10 mg PO</li>
<li><span class="ws">W*</span> Wheezing → Albuterol 2.5 mg in 3.0 mL via nebulizer or MDI; and/or Atrovent 0.5 mg in 2.5 mL via nebulizer; or DuoNeb</li></ul></li>
<li><strong>Pediatric:</strong><ul>
<li><span class="ws">W*</span> Epi 0.15 mg (1 mg/mL) IM OR 0.01 mg/kg IM (max single dose 0.3 mg)</li>
<li><span class="ws">W*</span> Albuterol: &lt;15 kg → 2.5–5 mg; &gt;15 kg → 5–10 mg via neb for wheezes</li>
<li><span class="ws">W*</span> Diphenhydramine 1 mg/kg PO (max 25 mg) OR Cetirizine: 2.5 mg PO 6 mo–5 yr; 5 mg PO 6–12 yr; 10 mg PO 13–18 yr</li></ul></li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement</div><ul>
<li>Consider Vascular Access</li>
<li>Adult SBP &lt;90 mmHg → treat per Shock/Hypotension protocol</li>
<li>Adult hypoperfusion → fluid challenge 500 mL LR/NS; repeat as needed, max 2,000 mL</li>
<li>Pediatric below min acceptable BP → Shock/Hypotension; fluid bolus 20 mL/kg LR/NS (max 60 mL/kg)</li></ul></div>
<div class="lv aemt-lv"><div class="lv-tag aemt-tag">AEMT</div><ul>
<li>Diphenhydramine 1 mg/kg IV (IM if no IV) / PO — adult max 50 mg; pediatric max 50 mg</li>
<li>Epinephrine 0.3 mg (1 mg/mL) IM OR 0.01 mg/kg (1 mg/mL) IM max 0.3 mg</li></ul></div></div>`},

{id:'cardiac-arrest-adult',title:'Cardiac Arrest – Adult',section:'medical',
tags:'cardiac arrest CPR AED pulseless VFib PEA asystole resuscitation epinephrine defibrillation',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Events leading to arrest</li><li>Estimated downtime / bystander CPR</li>
<li>POLST, DNI/R or Living Will</li>
<li>Hx: CP/SOB (Thrombosis: Pulmonary/MI or Tamponade)</li>
<li>Hx: HTN (Thrombosis: Pulmonary/MI)</li>
<li>Hx: Illicit Drug Use / Accidental OD</li>
<li>Hx: Dialysis / Renal Failure (Hyperkalemia)</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li>Absent heart sounds on auscultation</li>
<li class="b">Apnea / Agonal Respirations</li>
<li class="b">Pulseless</li><li class="b">Unresponsive</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential — <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">Hs &amp; Ts</a></div><ul>
<li>Hypovolemia; Hypoxia</li>
<li>Hydrogen Ions (Acidosis)</li>
<li>Hyper/Hypokalemia; Hyper/Hypoglycemia</li>
<li>Hypothermia; Toxins (overdose)</li>
<li>Tamponade, cardiac</li>
<li>Tension Pneumothorax; Thrombosis</li>
<li>AMS; Coma; Myxedema coma</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR / EMT</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Establish unresponsiveness; identify absence of pulse and respiration</li>
<li>High-quality CPR with minimal interruption<ul>
<li>2 min cycles, &lt;10 sec pause; rotate compressor q2 min; monitor rate, depth, no leaning</li></ul></li>
<li>Apply AED/EKG leads/defib pads; analyze and follow AED/monitor instructions</li></ul></div>
<div class="lv sga-lv"><div class="lv-tag sga-tag">EMT w/ SGA Endorsement</div><ul>
<li>SGA with 100% O₂</li>
<li><span class="ws">W*</span> Consider End-Tidal CO₂, if available</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement</div><ul>
<li>Consider Vascular Access</li>
<li>Hypovolemic shock cause → volume resuscitation 20 mL/kg LR/NS</li></ul></div>
<div class="lv aemt-lv"><div class="lv-tag aemt-tag">AEMT</div><ul>
<li><span class="ws">W*</span> Asystole / PEA (no shock) OR V-Fib / Pulseless V-Tach (shock advised):<br>Epinephrine 1 mg (1 mg/10 mL) IV/IO q 3–5 min</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>High Performance CPR: Monophasic 360 J or Biphasic device-specific equivalent (unknown → 200 J)</li>
<li>Not responding → consider Withholding/Terminating Resuscitation protocol</li>
<li>Spontaneous resuscitation → see Cardiac Arrest – Adult ROSC protocol</li></ul></div></div>`},

{id:'cardiac-arrest-adult-rosc',title:'Cardiac Arrest – Adult ROSC',section:'medical',
tags:'ROSC return spontaneous circulation post arrest cardiac CPR resuscitation',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div><ul>
<li>Events leading to arrest</li><li>Estimated downtime / bystander CPR</li>
<li>POLST, DNI/R or Living Will</li>
<li>Hx: CP/SOB; HTN; Illicit Drug Use; Dialysis/Renal Failure</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li>Sudden increase in EtCO₂</li>
<li>Return of pulse; return of normal respirations</li>
<li>Patient has spontaneous movement</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential — <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">Hs &amp; Ts</a></div><ul>
<li>Hypovolemia; Hypoxia; H⁺ (Acidosis)</li>
<li>Hyper/Hypokalemia; Hyper/Hypoglycemia</li>
<li>Hypothermia; Toxins; Tamponade</li>
<li>Tension Pneumothorax; Thrombosis</li>
<li>AMS; Coma; Myxedema coma</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Optimize ventilation and oxygenation</li>
<li>Titrate O₂ to target SpO₂ 94–99%</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Consider ECG / 12-lead if available</li></ul></div>
<div class="lv sga-lv"><div class="lv-tag sga-tag">EMT w/ SGA Endorsement</div><ul>
<li>SGA with 100% O₂ to achieve target SpO₂ 94–99%</li>
<li><span class="ws">W*</span> Consider EtCO₂ (normal 35–40 mmHg); do NOT hyperventilate (ideal rate 10–12/min)</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>SBP &lt;90 mmHg → treat per Shock/Hypotension protocol</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>Transport all ROSC patients to closest hospital with interventional capability per local criteria</li>
<li>Observe for sustained stability before transport — 5–10 min adequate for packaging/loading</li></ul></div></div>`},

{id:'chest-pain',title:'Chest Pain / ACS / MI / STEMI',section:'medical',
tags:'chest pain ACS MI STEMI heart attack angina nitroglycerin aspirin ECG cardiac NSTEMI',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Time of onset; Palliation/Provocation</li>
<li>Quality (crampy, constant, sharp, dull)</li>
<li>Region / Radiation / Referred; Severity (1–10); Time</li>
<li>Viagra, Cialis, Levitra use (male or female)</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li class="b">Abnormal vital signs</li>
<li class="b">CP — pain, pressure, aching, tightness</li>
<li class="b">Dizziness; Nausea, vomiting</li>
<li class="b">Pale, diaphoresis</li>
<li class="b">Radiation of pain</li>
<li class="b">Shortness of breath</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>Aortic dissection / aneurysm</li>
<li>Asthma / COPD; Chest wall injury</li>
<li>Esophageal spasm; GE reflux; Hiatal hernia</li>
<li>Pericarditis; Pleural pain; Pneumothorax</li>
<li>Pulmonary embolism; Trauma vs. Medical</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Titrate O₂ to target SpO₂ 94–99%</li>
<li><span class="ws">W*</span> Aspirin 324 mg PO</li>
<li>Calculate High Risk Score per Prehospital Cardiac Triage Destination Procedure</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Consider ECG / 12-lead if available</li>
<li><span class="ws">W*</span> Consider End-Tidal CO₂ if available</li>
<li>If SBP &gt;100: <span class="ws">W*</span> Nitroglycerin 0.4 mg SL; may repeat ×2 every 3–5 min (patient's own NTG)</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement</div><ul>
<li>Consider Vascular Access (before NTG administration)</li>
<li>SBP &lt;90 mmHg → treat per Shock/Hypotension protocol</li></ul></div>
<div class="lv aemt-lv"><div class="lv-tag aemt-tag">AEMT</div><ul>
<li>Nitroglycerin 0.4 mg SL; may repeat ×2 every 3–5 min OR Nitro Paste 1 inch to chest wall</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>Transport to closest hospital with interventional capability per local criteria</li>
<li>Follow State of Washington Prehospital Cardiac Triage and Destination Procedure</li>
<li>Do NOT give NTG if patient used Viagra/Cialis/Levitra within 24–48 hours</li></ul></div>
<div class="lv transport-lv"><div class="lv-tag transport-tag">High Risk Criteria (4+ = High Risk)</div><ul>
<li>Age ≥55; 3+ CAD risk factors (family hx, HTN, high cholesterol, diabetes, current smoker)</li>
<li>Aspirin use in last 7 days; 2+ anginal events in past 24 hours</li>
<li>Known coronary disease; ST deviation ≥0.5; Elevated cardiac markers</li></ul></div></div>`},

{id:'diabetic-emergency',title:'Diabetic Emergency',section:'medical',
tags:'diabetic hypoglycemia hyperglycemia glucose insulin DKA blood sugar oral glucose D10 glucagon',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Medications (Oral vs. Insulin); Insulin pump</li>
<li>Alterations or missed doses; Last meal</li>
<li>Recent illness; Illicit drug use / toxicingestion</li>
<li>History of trauma; GI history; Syncope</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li class="b">Abnormal vital signs persist</li>
<li>Decreased / Bizarre mental status</li>
<li class="b">Hyperglycemia: warm, dry skin, fruity breath, Kussmaul resp, dehydration signs</li>
<li>Hypoglycemia: cool, diaphoretic skin</li>
<li class="b">Shortness of breath; Syncope</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>Hypovolemia; Hypoxia; H⁺ (Acidosis)</li>
<li>Hyper/Hypoglycemia; Hyper/Hypokalemia</li>
<li>Hypothermia; Toxins; Tamponade</li>
<li>Tension Pneumothorax; Thrombosis</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li><span class="ws">W*</span> Check blood glucose level</li>
<li><strong>HYPOGLYCEMIA (&lt;60 mg/dL) — patient can protect airway:</strong><ul>
<li><span class="ws">W*</span> Adult: oral glucose 25 g (one tube)</li>
<li><span class="ws">W*</span> Pediatric: oral glucose 0.5–1 g/kg, max 25 g</li>
<li>Check BGL after 5 min; repeat if still low and symptomatic</li></ul></li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Check blood glucose level</li>
<li><strong>HYPOGLYCEMIA (&lt;60 mg/dL — patient can protect airway):</strong><ul>
<li>Oral glucose — one tube</li>
<li><span class="ws">W*</span> Adult: Glucagon 1 mg (1 unit) IM/IN</li>
<li><span class="ws">W*</span> Pediatric: Glucagon 0.02 mg/kg IM (max 1 mg)</li></ul></li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension protocol</li>
<li><strong>HYPOGLYCEMIA:</strong><ul>
<li><span class="ws">W*</span> Adult: D10 IV, titrate to effect, up to 25 g</li>
<li>Pediatric: D10 5 mL/kg by infusion, not to exceed 250 mL total</li>
<li>Newborn: D10 2 cc/kg</li></ul></li>
<li><strong>HYPERGLYCEMIA (&gt;250 mg/dL with symptoms):</strong><ul>
<li>Adult: Fluid challenge 1 L bolus IV; reassess; contact MC before re-bolus</li>
<li>Pediatric: 10 cc/kg (or 20 cc/kg if hypotensive)</li></ul></li></ul></div></div>`},
{id:'altered-mental-status',title:'Altered Mental Status (AMS)',section:'medical',
tags:'AMS altered mental status confusion LOC unconscious glucose stroke seizure overdose alcohol AEIOU TIPS',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Hx of Diabetes (self/family)</li><li>Hx cardiac/stroke/seizure</li>
<li>Hx of Trauma</li><li>Previous/current illicit drug use</li>
<li>Toxic ingestion; Recent illness; Syncope</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li class="b">Abnormal vital signs persist</li>
<li>Bizarre behavior (hallucinations, delusions)</li>
<li>Change in baseline mental status</li>
<li class="b">Decreased mental status</li>
<li>Hypoglycemia (cool, diaphoretic skin, seizure)</li>
<li>Hyperglycemia (warm, dry skin, Kussmaul resp)</li>
<li class="b">Shortness of breath; Syncope</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential — <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">AEIOU-TIPS</a></div><ul>
<li>A — Alcohol / Acidosis</li>
<li>E — Endocrine / Epilepsy / Electrolytes / Encephalopathy</li>
<li>I — Insulin; O — Opiates / Overdose / Oxygen</li>
<li>U — Uremia; T — Trauma</li>
<li>I — Infection; P — Poisoning / Psychosis</li>
<li>S — Stroke / Seizure / Syncope</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li><span class="ws">W*</span> Check blood glucose level</li>
<li>Treat underlying cause if known:<ul>
<li>Trauma suspected → General Trauma Management</li>
<li>Cardiac suspected → Chest Pain/ACS/MI/STEMI protocol</li>
<li>Sepsis suspected → Sepsis protocol</li>
<li>Stroke suspected → Stroke/TIA/Neurological protocol</li>
<li>Diabetic suspected → Diabetic Emergency protocol</li>
<li>Overdose suspected → Overdose/Toxicology/Poisoning protocol</li></ul></li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Consider ECG / 12-lead if available</li>
<li><span class="ws">W*</span> Consider End-Tidal CO₂ if available</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension protocol</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>Safer to assume hypoglycemia than hyperglycemia if in doubt</li>
<li>Do not let suspected alcohol/drug use confuse clinical picture — intoxication masks hypoglycemia and head trauma</li>
<li>Low glucose &lt;60; normal 60–120; high &gt;250</li>
<li>Consider Restraints per Physical Restraint procedure if needed for patient/personnel safety</li>
<li>Repeat blood glucose for any change in mental status</li></ul></div></div>`},

{id:'behavioral-emergencies',title:'Behavioral / Psychiatric Medical Emergencies',section:'medical',
tags:'behavioral psychiatric agitation psychosis suicide homicidal combative delirium restraint',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Diabetes; Medic alert tag</li>
<li>Injury to self or threats to others</li>
<li>Psychiatric illness / medications</li>
<li>History of suicidal / homicidal thoughts</li>
<li>Situational crisis; Substance abuse/OD</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li>Affect change, hallucinations; Anxiety; Agitation</li>
<li>Combative / violent</li>
<li class="b">Confusion</li>
<li>Delusional thoughts, bizarre behavior</li>
<li>Expression of suicidal / homicidal thoughts</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>Alcohol intoxication; Alzheimer's/Dementia</li>
<li>Bipolar; Schizophrenia; DKA or Infection</li>
<li>Electrolyte disturbances; Excited Delirium</li>
<li>Head injury; Hypertensive emergency</li>
<li>Medication effect/overdose; Sepsis/Meningitis</li>
<li>Seizure/Postictal; Toxin/Substance abuse</li>
<li>Withdrawal syndromes</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Determine scene safety — if not safe, leave and stage</li>
<li>Initiate Universal Patient Care protocol</li>
<li><span class="ws">W*</span> Check blood glucose level</li>
<li>Treat underlying cause if known</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Consider ECG / 12-lead if available</li>
<li><span class="ws">W*</span> Consider End-Tidal CO₂ if available</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension protocol</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>Consider all possible medical/trauma causes for behavior</li>
<li>Do not overlook possibility of domestic violence or child abuse</li>
<li>Consider Uncooperative Patients / Unsecured Scenes procedure</li></ul></div></div>`},

{id:'bites-envenomation',title:'Bites / Envenomation',section:'medical',
tags:'bites envenomation snake spider bee sting anaphylaxis rabies tetanus poison control',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available<br>Contact Poison Control: <strong>1-800-709-0911</strong><br>Rapid Transport with early alert to receiving facility</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Type of bite/sting; Time/location</li>
<li>Known allergy/anaphylaxis</li>
<li>Immunocompromised; Tetanus and Rabies risk</li>
<li>Domestic vs. wild; Previous reaction</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li>Allergic reaction, hives, itching</li>
<li>Blood oozing from bite wound</li>
<li class="b">Hypotension or Shock</li>
<li>Evidence of infection; Pain, soft-tissue swelling, redness</li>
<li class="b">Shortness of breath, wheezing</li>
<li>Snake Bite: Numbness/Paresthesia</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>Animal bite; Human bite</li>
<li>Infection risk or cellulitis</li>
<li>Insect sting (bee, wasp, ant, tick)</li>
<li>Rabies risk</li>
<li>Snake bite (poisonous); Spider bite (poisonous)</li>
<li>Tetanus risk</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Venomous snake bite → keep site at heart level or below; immobilize entire length of involved extremity</li>
<li>Anaphylaxis → Allergic Reaction/Anaphylaxis protocol; avoid Epi injection in affected extremity if possible</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li><span class="ws">W*</span> Albuterol, Atrovent, or DuoNeb for bronchospasm → Respiratory Distress/Reactive Airway Disease protocol</li>
<li>Consider ECG / 12-lead if available</li></ul></div>
<div class="lv sga-lv"><div class="lv-tag sga-tag">EMT w/ SGA Endorsement</div><ul>
<li>If airway not manageable by BLS methods, consider SGA</li>
<li><span class="ws">W*</span> Consider End-Tidal CO₂ if available</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension protocol</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>Consider rapid transport to hospital that can provide antivenom; contact MC for additional guidance</li>
<li>Provide early alert to receiving facility</li></ul></div></div>`},

{id:'cardiac-arrest-pediatric',title:'Cardiac Arrest – Pediatric',section:'medical',
tags:'pediatric cardiac arrest CPR AED child infant pulseless resuscitation epi epinephrine',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Events leading to arrest; Medical history</li>
<li>Possibility of foreign body</li>
<li>Respiratory distress or arrest</li>
<li>Possible toxic or poison exposure; Congenital disease</li>
<li>Estimated downtime / bystander CPR</li>
<li>Medication (maternal or child); Hypothermia</li>
<li>Non-accidental trauma; SIDS; POLST, DNI/R</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li class="b">Apnea / Agonal Respirations</li>
<li class="b">Pulseless</li>
<li class="b">Unresponsive</li>
<li>Absent heart sounds on auscultation</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential — <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">Hs &amp; Ts</a></div><ul>
<li>Hypovolemia; Hypoxia; H⁺ (Acidosis)</li>
<li>Hyper/Hypokalemia; Hyper/Hypoglycemia</li>
<li>Hypothermia; Toxins; Tamponade</li>
<li>Tension Pneumothorax</li>
<li>Thrombosis (coronary or pulmonary)</li>
<li>Trauma (hypovolemia, increased ICP)</li>
<li>Foreign body obstruction; Respiratory effort</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR / EMT</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Establish unresponsiveness; identify absence of pulse and respirations</li>
<li>High-quality CPR with minimal interruption<ul>
<li>2 min cycles, &lt;10 sec pause; rotate compressor q2 min</li></ul></li>
<li>Apply AED/EKG leads/defib pads; analyze and follow AED/monitor instructions</li></ul></div>
<div class="lv sga-lv"><div class="lv-tag sga-tag">EMT w/ SGA Endorsement</div><ul>
<li>SGA with 100% O₂</li>
<li><span class="ws">W*</span> Consider End-Tidal CO₂ if available</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement</div><ul>
<li>Consider Vascular Access</li>
<li>If arrest from hypovolemic shock: volume resuscitation 20 mL/kg LR/NS</li></ul></div>
<div class="lv aemt-lv"><div class="lv-tag aemt-tag">AEMT</div><ul>
<li><span class="ws">W*</span> Asystole/PEA (no shock) OR V-Fib/Pulseless V-Tach (shock):<br>Epi 1:10,000 — 0.01 mg/kg IV/IO</li></ul></div>
<div class="lv peds-lv"><div class="lv-tag peds-tag">Pediatric Considerations</div><ul>
<li>Use weight-based system (length-based tape)</li>
<li>Use pediatric defib pads when available; adult pads if pediatric unavailable</li>
<li>Not responding → consider Withholding/Terminating Resuscitation</li>
<li>Spontaneous resuscitation → Cardiac Arrest – Pediatric ROSC protocol</li></ul></div></div>`},

{id:'cardiac-arrest-pediatric-rosc',title:'Cardiac Arrest – Pediatric ROSC',section:'medical',
tags:'pediatric ROSC return spontaneous circulation post arrest child infant resuscitation',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div><ul>
<li>Past Medical History; Event/complaints</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li>Sudden increase in EtCO₂</li>
<li>Return of pulse; Return of normal respirations</li>
<li>Patient has spontaneous movement</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential — <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">Hs &amp; Ts</a></div><ul>
<li>Hypovolemia; Hypoxia; H⁺ (Acidosis)</li>
<li>Hyper/Hypokalemia; Hyper/Hypoglycemia</li>
<li>Hypothermia; Toxins; Tamponade</li>
<li>Tension Pneumothorax; Thrombosis; Foreign body obstruction</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Optimize ventilation and oxygenation</li>
<li>Titrate O₂ to target SpO₂ 94–99%</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Consider ECG / 12-lead if available</li></ul></div>
<div class="lv sga-lv"><div class="lv-tag sga-tag">EMT w/ SGA Endorsement</div><ul>
<li>SGA with 100% O₂ to target SpO₂ 94–99%</li>
<li><span class="ws">W*</span> EtCO₂ (normal 35–40 mmHg); do NOT hyperventilate</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>If hypotensive → Shock/Hypotension protocol</li>
<li>Fluid bolus 20 mL/kg IV/IO as needed; may repeat up to 60 mL/kg</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>Transport all ROSC patients to closest hospital with interventional capability per local criteria</li>
<li>Observe for sustained stability — 5–10 min adequate for packaging/loading</li>
<li>Avoid hypothermia</li></ul></div></div>`},

{id:'drowning',title:'Drowning / Submersion',section:'medical',
tags:'drowning submersion near drowning water CPAP hypothermia barotrauma decompression',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Aspiration of fluid</li>
<li>Submersion — regardless of depth</li>
<li>Possible history of trauma</li>
<li>Duration of immersion; Temperature of water</li>
<li>Salt vs. Fresh water</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li class="b">Changes in mental status</li>
<li>Coughing; Vomiting</li>
<li class="b">Wheezing, rales, rhonchi</li>
<li class="b">Respiratory compromise</li>
<li class="b">Stridor; Unresponsive</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>Air gas embolism; Cardiac arrest</li>
<li>Nitrogen Narcosis</li>
<li>Pre-existing medical problem</li>
<li>Pulmonary barotrauma; Trauma</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Spinal immobilization while still in water if indicated</li>
<li>Protect cervical spine if diving accident</li>
<li>If hypothermic → Hypothermia/Cold Emergencies protocol</li>
<li>DECOMPRESSION SICKNESS/barotrauma → give O₂; no positive pressure ventilation unless NOT breathing</li>
<li>Keep patient in supine position</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Monitor lung sounds frequently</li>
<li>Institute CPAP or PEEP for pulmonary edema if available</li>
<li>Consider ECG / 12-lead if available</li>
<li><span class="ws">W*</span> Consider End-Tidal CO₂ if available</li></ul></div>
<div class="lv sga-lv"><div class="lv-tag sga-tag">EMT w/ SGA Endorsement</div><ul>
<li>If airway not manageable by BLS methods, consider SGA</li>
<li>Decompression sickness → no positive pressure unless not breathing</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension protocol</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>Consider self-safety before rescue attempt — drowning is a leading cause of death among rescuers</li>
<li>ALL near-drowning patients should be transported for hospital evaluation</li>
<li>Protect against and/or treat hypothermia per protocol</li>
<li>With pressure injuries (decompression/barotrauma): consider transport for hyperbaric chamber</li>
<li>Hypothermic/near-drowning patients: resuscitate until care transferred to definitive care; contact MC for ECMO or advanced warming</li></ul></div></div>`},

{id:'hyperthermia',title:'Hyperthermia / Heat Injuries',section:'medical',
tags:'heat stroke heat exhaustion hyperthermia hot temperature cooling heat cramps heat rash',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Age; Exposure to increased temperature/humidity</li>
<li>Time and duration of exposure; Extreme exertion</li>
<li>Medications (anticholinergics, anti-seizure, etc.)</li>
<li>Toxic ingestion/substance abuse; Poor PO intake</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li><strong>Mild:</strong> Heat rash, edema, cramps; Heat exhaustion (weakness, HA, dizziness, nausea, vomiting, syncope, abdominal pain)</li>
<li class="b"><strong>Severe — Heat Stroke:</strong> AMS, seizure, hyperthermia, dry skin OR profuse sweating</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>CVA; Delirium tremens (DTs)</li>
<li>Dehydration; Head Trauma; Heat Cramps/Exhaustion/Stroke</li>
<li>Hyperthyroidism (Storm); Hypoglycemia</li>
<li>Encephalopathy; Fever/Infection/Sepsis</li>
<li>Meningitis/Sepsis; Poisoning/overdose; Substance abuse</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Altered Mental Status protocol as indicated</li>
<li>Treat nausea/vomiting per Nausea/Vomiting protocol</li>
<li><strong>Heat Cramps / Heat Exhaustion:</strong><ul>
<li>Move to cooler environment; remove excess clothing</li>
<li>Tepid compresses to forehead, neck, extremities</li>
<li>Oral fluids if possible (water, Gatorade, etc.)</li></ul></li>
<li><strong>Heat Stroke:</strong><ul>
<li>Move to cooler environment; remove clothing; aggressive cooling</li>
<li>Cold/ice packs to axilla/groin; evaporative airflow; buckets of ice with fan</li>
<li>Ice bath immersion = most rapid cooling (if unavailable: Tarp-assisted cooling with oscillating ice water-soaked towels/sheets)</li></ul></li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Consider ECG / 12-lead if available</li>
<li><span class="ws">W*</span> Consider End-Tidal CO₂ if available</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension protocol</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>High-risk patients: neonates, infants, geriatric, mentally ill</li>
<li>Environment &gt;90°F AND humidity &gt;60% = highest risk</li>
<li>Heat stroke associated with cardiac arrhythmias independent of drug ingestion</li>
<li>For heat stroke: rapid cooling takes priority over cardiac monitoring, IV access</li>
<li>Consider exercise-associated hyponatremia (EAH) in endurance athletes with AMS, normal glucose, normal temperature</li></ul></div></div>`},

{id:'hypothermia',title:'Hypothermia / Cold Emergencies',section:'medical',
tags:'hypothermia cold frostbite VFib rewarming temperature exposure drowning core temperature',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Exposure temperature / wind chill</li>
<li>Length of exposure</li>
<li>Drowning/submersion victim</li>
<li>Toxic ingestion / substance abuse</li>
<li>Hx Hypothyroidism</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li class="b">AMS or Coma</li>
<li class="b">Stroke-like symptoms (slurred speech, gait ataxia)</li>
<li class="b">Arrhythmias</li>
<li class="b">Bradycardia and/or Hypotension</li>
<li>Extremity pain, sensory abnormalities</li>
<li>White / Waxy skin</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>CNS (stroke, head injury, spinal cord injury)</li>
<li>Sepsis; Hypothyroidism; Hypoglycemia</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Altered Mental Status protocol as indicated</li>
<li>Handle patient gently to avoid VF</li>
<li>Gently remove wet clothes; protect from further exposure; dry as soon as possible</li>
<li>Warm patient by external means</li>
<li>Assess ABCs — allow up to 60 sec to confirm respiratory arrest, pulseless arrest, or bradycardia requiring CPR</li>
<li>Rewarming: warm packs, heated blankets, warmed ambulance; heat packs to groin, axilla</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Consider ECG / 12-lead if available</li>
<li><span class="ws">W*</span> Consider End-Tidal CO₂ if available</li>
<li>Transport as necessary</li></ul></div>
<div class="lv sga-lv"><div class="lv-tag sga-tag">EMT w/ SGA Endorsement</div><ul>
<li>If airway not manageable by BLS methods, consider SGA</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension protocol</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>Defined as core temperature &lt;95°F (35°C); shivering stops below 90°F (32°C)</li>
<li>"Cold and dead are NOT dead until warm and dead" — resuscitate hypothermic/near-drowning patients</li>
<li>Most common cause of death in hypothermia = ventricular fibrillation</li>
<li>Heart most likely to fibrillate 85–88°F (29–31°C) — defibrillate VF/VT ×1; if no change, defer repeats until rewarmed</li>
<li>Do NOT attempt to rewarm deep frostbite unless extreme transport delay and no risk of refreezing</li>
<li>Do NOT allow patients with frozen extremities to ambulate</li>
<li>Patients with low core temps may not respond to ALS drug interventions</li></ul></div></div>`},
{id:'vad',title:'Implantable Ventricular Assist Devices (VAD)',section:'medical',
tags:'VAD LVAD RVAD BiVAD ventricular assist device cardiac pump malfunction',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Manage airway as indicated</li>
<li>VAD-related/cardiovascular problem → expedite transport to facility where VAD was placed (if condition/time allows)</li>
<li>Non-cardiovascular problem → transport to facility appropriate for main presenting problem without manipulating device</li>
<li>Full cardiac arrest: CPR should NOT be performed if evidence pump is still functioning<ul>
<li>Initiate CPR only if: pump has stopped AND troubleshooting to restart has failed AND patient is unresponsive with no detectable signs of life</li></ul></li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Cardiac monitoring; Consider ECG / 12-lead if available</li></ul></div>
<div class="lv sga-lv"><div class="lv-tag sga-tag">EMT w/ SGA Endorsement</div><ul>
<li>If airway not manageable by BLS methods, consider SGA</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>Patient with functioning VAD who is hypoperfused:<ul>
<li>IV fluids 30 mL/kg isotonic (push-pull method); max 1 L; may repeat ×3 (max 3 L total)</li></ul></li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Considerations</div><ul>
<li>VAD pump flow is NOT pulsatile — patient may have no palpable pulse or accurate pulse oximetry</li>
<li>Automatic BP cuffs often ineffective; MAP is usually accurate if a reading is obtained</li>
<li>Do NOT disconnect controller or batteries to defibrillate/cardiovert or acquire 12-lead ECG</li>
<li>VF, VT, or asystole/PEA may be the patient's "normal" underlying rhythm</li>
<li>Most common VAD alarm cause: low batteries or battery failure</li>
<li>Always bring patient's power module, cable, display module, and backup controller to hospital</li>
<li>VAD complications: Infection, Stroke/TIA, Bleeding, Arrhythmias, Cardiac tamponade</li></ul></div></div>`},

{id:'nausea-vomiting',title:'Nausea / Vomiting',section:'medical',
tags:'nausea vomiting emesis ondansetron zofran antiemetic isopropyl alcohol',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div><ul>
<li>Gastrointestinal; Cardiovascular; Obstetric/gynecologic</li>
<li>Hypoglycemia; Hyperglycemia; Neurologic</li>
<li>Oncologic; Psychogenic; Toxidrome</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li>Emesis; Abdominal pain</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>Pregnancy; Hypoglycemia; Hyperglycemia</li>
<li>Bowel obstruction; Myocardial Infarction</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Universal Patient Care protocol</li>
<li><span class="ws">W*</span> Check blood glucose level</li>
<li>Treat nausea: Isopropyl alcohol — allow patient to inhale vapor from IPA wipe ×3 over 15 min as tolerated</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li><span class="ws">W*</span> Adult: Ondansetron 4–8 mg SL ODT</li>
<li><span class="ws">W*</span> Pediatric: Ondansetron 2 mg SL ages 1–5 yr; 4 mg ODT age 6+ yr</li></ul></div>
<div class="lv aemt-lv"><div class="lv-tag aemt-tag">AEMT</div><ul>
<li>Adult: Ondansetron 4 mg IM/IV</li>
<li>Pediatric: 2 mg SL ages 1–5 yr; 4 mg ODT age 6+ yr</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Considerations</div><ul>
<li>Nausea and vomiting are symptoms — thorough history and physical key to identifying emergent underlying disease</li></ul></div></div>`},

{id:'newborn-resuscitation',title:'Newborn Resuscitation / Post Delivery Care',section:'medical',
tags:'newborn resuscitation delivery birth APGAR neonatal infant CPR oxygen bulb suction',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Suction with bulb syringe PRN — mouth then nose</li>
<li>Prevent heat loss: quickly dry infant; remove wet linens; maintain warm environment; place in mother's arms if condition warrants</li>
<li>APGAR: assess breathing and heart rate</li>
<li>Breathing control: stimulate by gently flicking heels, rubbing spine; face mask 6L O₂ or blow-by O₂</li>
<li>Positive pressure ventilation (PPV) if: apnea or gasping — APGAR ≤5 — HR &lt;100</li>
<li>At 30–60 sec after delivery, clamp and cut cord ~6 inches from infant (if resuscitation needed, may clamp sooner)</li>
<li>CPR if HR &lt;60 bpm at ratio 3:1 compression to ventilation</li>
<li><span class="ws">W*</span> Blood glucose check if &lt;50 mg/dL → Diabetic Emergency protocol</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Blood glucose check if &lt;50 mg/dL → Diabetic Emergency protocol</li>
<li><span class="ws">W*</span> Consider End-Tidal CO₂ if available</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>Persistent bradycardia (rate &lt;60) despite PPV</li>
<li>Neonatal fluid resuscitation: 10 mL/kg normal saline</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Additional Considerations</div><ul>
<li>Continue assisted ventilation as needed; closely monitor respiratory effort, HR, blood glucose, SpO₂</li>
<li>Keep newborn normothermic — hypothermia significantly increases morbidity</li>
<li>Allow placenta to deliver naturally — do NOT pull on umbilical cord; transport all passed tissue to hospital</li>
<li>Massage fundus to help control postpartum bleeding</li></ul></div>
<div class="lv transport-lv"><div class="lv-tag transport-tag">APGAR Scale</div>
<table class="dose-table"><thead><tr><th>Sign</th><th>0</th><th>1</th><th>2</th></tr></thead><tbody>
<tr><td>Activity</td><td>Absent</td><td>Arms/Legs Flexed</td><td>Active movement</td></tr>
<tr><td>Pulse</td><td>Absent</td><td>&lt;100</td><td>&gt;100</td></tr>
<tr><td>Grimace</td><td>No response</td><td>Grimace/flexion</td><td>Sneeze, cough, pulls away</td></tr>
<tr><td>Appearance</td><td>Blue/Pale</td><td>Normal except extremities</td><td>Normal overall</td></tr>
<tr><td>Respiration</td><td>Absent</td><td>Slow, irregular</td><td>Good, strong cry</td></tr>
</tbody></table>
<p style="font-size:12px;padding:4px 0">0–3 Severely depressed; 4–6 Moderately depressed; 7–10 Excellent</p></div></div>`},

{id:'ob-emergencies',title:'OB / GYN Emergencies / Childbirth / Postpartum',section:'medical',
tags:'obstetric gynecological childbirth delivery postpartum pregnancy ectopic placenta breech cord prolapse hemorrhage',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Pregnancy/Date of LMP/Due date; Gravida/Para</li>
<li>Hx pregnancy complications; Prenatal care</li>
<li>Smoking, alcohol, substance abuse</li>
<li>Onset/type of bleeding; Trauma; Medications (anticoagulants)</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li>Spasmodic abdominal pain; Urge to defecate</li>
<li>Vaginal discharge or bleeding; Vaginal crowning</li>
<li>Tachycardia; Hypotension</li>
<li class="b">AMS; Abdominal pain</li>
<li>Visible vaginal bleeding; Signs of trauma/abuse</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>Ectopic pregnancy; Placental abruption</li>
<li>Placenta previa; Uterine rupture</li>
<li>Spontaneous abortion; Postpartum hemorrhage</li>
<li>Abdominal/pelvic trauma</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR / EMT</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Vaginal bleeding → determine pregnancy status; transport any passed tissue with patient</li>
<li>Third-trimester females → left lateral decubitus (protect spine if indicated)</li>
<li>Multiple or precipitous delivery → request additional ambulance</li>
<li><strong>Normal (headfirst) delivery:</strong><ul>
<li>Sterile/clean technique; guide but do not retard or hurry delivery</li>
<li>Check for cord around neck — gently remove if found</li>
<li>Apply gentle counterpressure to baby's head as it delivers</li>
<li>Assist delivery of shoulders and rest of body</li>
<li>After delivery: assess per Newborn Resuscitation protocol</li>
<li>Briefly dry infant; place on mother's chest skin-to-skin; cover with dry blanket</li>
<li>APGAR at 1 min and 5 min after birth</li>
<li>Clamp/cut cord 30–60 sec after delivery (~6 inches from infant)</li>
<li>Do NOT delay transport to deliver placenta; massage uterus externally after placenta delivers</li>
<li>Postpartum hemorrhage &gt;500 mL → continue uterine massage; treat for shock</li></ul></li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>Hypoperfusion → 500 mL NS/LR initial; additional challenges as needed, max 2,000 mL</li></ul></div>
<div class="lv transport-lv"><div class="lv-tag transport-tag">Abnormal Presentations</div><ul>
<li><strong>Breech:</strong> Allow mother to push; do NOT pull baby; gently extract; if head not delivering, place gloved hand in vagina forming "V" around baby's mouth/nose</li>
<li><strong>Prolapsed Cord:</strong> Knee-chest or extreme Trendelenburg; insert gloved hand to lift head/body off cord; observe cord pulsations; rapid transport</li>
<li><strong>Cord Around Neck:</strong> Two fingers — slip cord forward over shoulder/head; if unsuccessful, clamp cord with two clamps, cut between, carefully unwrap</li>
<li><strong>Abruptio Placentae:</strong> Placenta separates prematurely; lower abdominal pain, rigid uterus; shock may develop without significant vaginal bleeding</li>
<li><strong>Placenta Previa:</strong> Placenta covers cervical opening; vaginal bleeding; cesarean section needed</li></ul></div></div>`},

{id:'overdose',title:'Overdose / Toxicology / Poisoning',section:'medical',
tags:'overdose OD toxicology poisoning narcan naloxone opioid carbon monoxide organophosphate SLUDGE activated charcoal',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available<br>Contact Poison Control: <strong>1-800-709-0911</strong></div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Ingestion or suspected ingestion of potentially toxic substance</li>
<li>Substance ingested, route, quantity; Time of ingestion</li>
<li>Reason (suicidal, accidental, criminal)</li>
<li>Available medications in home; Home remedies given prior</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li class="b"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SLUDGE</a> and <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">DUMBBELS</a></li>
<li class="b">Mental status changes</li>
<li class="b">Hypotension / Hypertension</li>
<li>Decreased respiratory rate</li>
<li class="b">Tachycardia, dysrhythmias; Seizures</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>TCAs; Acetaminophen; Depressants; Stimulants</li>
<li>Anticholinergic; Cardiac medications</li>
<li>Solvents, alcohols, cleaning agents</li>
<li>Insecticides (organophosphates)</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Identify substance and amount ingested/exposed if possible</li>
<li>Collect empty bottles/containers; transport with patient</li>
<li><span class="ws">W*</span> Check blood glucose level</li>
<li><strong>SUSPECTED OPIOID OVERDOSE w/ Respiratory Depression:</strong><ul>
<li>Adult: Naloxone 0.4–4 mg IN; repeat q2–3 min up to 10 mg or until airway maintained and adequate breathing</li>
<li>Pediatric: Naloxone 0.1 mg/kg IN (max 2 mg/dose); repeat q2–3 min up to 10 mg; do NOT give to newborns</li></ul></li>
<li><strong>Carbon Monoxide:</strong> 100% O₂ NRB or CPAP; determine CO level with commercial device if available; SpCO 3–25% with neuro symptoms → treat and transport; SpCO &gt;25% → contact MC for diversion to hyperbaric chamber</li>
<li><strong>Organophosphates (<a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SLUDGE</a>):</strong> Prepare for copious secretions; Atropine nerve agent auto-injector; Pralidoxime Chloride (2-PAM) adult 1 auto-injector (600 mg) IM into thigh</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Consider ECG / 12-lead if available</li>
<li><span class="ws">W*</span> Consider End-Tidal CO₂ if available</li>
<li><span class="ws">W*</span> If ingestion within ONE HOUR of EMS arrival: Activated Charcoal adult 50 g PO — <strong>contact Poison Control prior: 1-800-709-0911</strong></li>
<li>Pediatric charcoal: 1 gm/kg PO (min 10 g, max 50 g)</li>
<li><strong>OPIOID (EMT):</strong> Adult Naloxone 0.4–4 mg IM <span class="ws">W*</span> q2–3 min up to 10 mg; Pediatric 0.1 mg/kg IM (max 2 mg/dose) up to 10 mg</li></ul></div>
<div class="lv sga-lv"><div class="lv-tag sga-tag">EMT w/ SGA Endorsement</div><ul>
<li>If airway not manageable by BLS methods, consider SGA</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement</div><ul>
<li>Consider Vascular Access</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension protocol</li>
<li>Phenothiazine dystonic reaction/akathisia: Diphenhydramine 12.5–50 mg IV/IM (pediatric: 1 mg/kg max 25 mg)</li></ul></div>
<div class="lv aemt-lv"><div class="lv-tag aemt-tag">AEMT — Opioid Overdose</div><ul>
<li>Adult: Naloxone 0.4–2 mg IV/IO q2–3 min, max 10 mg</li>
<li>Pediatric: 0.1 mg/kg IV q2–3 min, max 2 mg/dose, max total 10 mg</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">General Considerations</div><ul>
<li>Scene safety paramount — if substance poses hazard/contamination risk, do NOT transport material with patient</li>
<li>If narcotic overdose/hypoglycemia suspected, administer Narcan/Glucose prior to SGA</li>
<li>Consider neglect/abuse</li>
<li>Narcan NOT recommended for initial resuscitation of the newborn</li></ul></div></div>`},

{id:'pain-management',title:'Pain Management',section:'medical',
tags:'pain acetaminophen tylenol ibuprofen nitrous oxide analgesic pain scale FLACC',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Inclusion / Exclusion</div><ul>
<li><strong>Inclusion:</strong> Patients experiencing pain</li>
<li><strong>Exclusion:</strong> Pregnancy with active labor</li></ul></div>
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>O₂ to maintain SpO₂ 94–99% or as indicated</li>
<li>Ice/cold pack and positioning as appropriate</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li><span class="ws">W*</span> Acetaminophen 15 mg/kg PO, max adult dose 1 gram</li>
<li><span class="ws">W*</span> Ibuprofen 10 mg/kg PO for patients &gt;6 months of age (max dose 800 mg)</li>
<li><span class="ws">W*</span> Nitrous Oxide if available</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Pain Assessment Tools</div><ul>
<li><strong>Adult / Verbal:</strong> Numeric scale 0–10 (0 = no pain; 10 = worst possible)</li>
<li><strong>Pediatric 0–2 yr:</strong> FLACC scale (Face, Legs, Activity, Cry, Consolability) — 0–2 each, total 0–10</li>
<li><strong>Pediatric 3–7 yr:</strong> Oucher scale (faces/photos)</li>
<li><strong>Pediatric 3+ yr / Cognitively intact:</strong> Wong-Baker FACES scale</li></ul></div></div>`},

{id:'pediatric-brue',title:'Pediatric BRUE — Brief Resolved Unexplained Event',section:'medical',
tags:'BRUE ALTE infant pediatric apnea color change tone resolved unexplained event SIDS',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Inclusion Criteria</div><ul>
<li>Infant &lt;1 year old; event reported by bystander as sudden, brief (&lt;1 min), completely resolved upon EMS arrival</li>
<li>Includes ≥1 of: absent/decreased/irregular breathing; color change (central cyanosis or pallor); marked change in muscle tone; altered level of responsiveness</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Exclusion Criteria — transport and evaluate if any present</div><ul>
<li>Abnormal vital signs for age (including fever); vomiting; signs of trauma; noisy or labored breathing</li>
<li>Identifiable cause: gastric reflux, swallowing dysfunction, nasal congestion, periodic breathing, breath-holding spell, choking/gagging, seizure activity, hypoglycemia</li>
<li>Significant past medical history (congenital heart disease, pulmonary disease, VP shunt, seizure disorder)</li>
<li>History or exam concerning for child abuse/neglect</li></ul></div>
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR / EMT / AEMT — Patient Management</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Support ABCs; follow Respiratory Distress protocol as needed</li>
<li>Obtain and document: complications of pregnancy, birth date/gestational age, fever or recent infection, prior BRUE episodes, underlying conditions, resuscitation attempts before EMS arrival</li>
<li>Consider ECG / 12-lead if available (EMT and above)</li>
<li><span class="ws">W*</span> Assess blood glucose (EMR)</li>
<li>Transport via ALS to ED even if infant currently appears in no distress, if available</li>
<li>OLMC contact mandatory if parent/guardian wishes to refuse transport</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Considerations</div><ul>
<li>BRUE = group of symptoms, NOT a specific disease; most common &lt;1 yr, may occur up to 2 yr</li>
<li>Many infants appear normal by the time EMS arrives</li>
<li>Consider non-accidental trauma</li>
<li>Serious causes: pneumonia, bronchiolitis, seizure, sepsis, intracranial hemorrhage, meningitis</li>
<li>More frequent in premature infants and those with cystic fibrosis, bronchiolitis, or congenital heart disease</li></ul></div></div>`},

{id:'respiratory-distress',title:'Respiratory Distress / Reactive Airway Disease',section:'medical',
tags:'respiratory distress asthma COPD albuterol bronchospasm wheezing shortness breath dyspnea CPAP stridor airway',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Asthma; COPD (emphysema, bronchitis)</li>
<li>Congestive heart failure</li>
<li>Home treatment (O₂, nebulizer)</li>
<li>Medications (theophylline, steroids, inhalers)</li>
<li class="b">No improvement with initial treatment</li>
<li>Toxic exposure; Smoking</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li class="b">Decreased ability to speak</li>
<li>Fever, cough</li>
<li class="b">Increased respiratory rate and effort</li>
<li class="b">Pursed-lip breathing</li>
<li class="b">Shortness of breath; Suspected PE</li>
<li>Tachycardia; Wheezing, rhonchi, rales</li>
<li class="b">Use of accessory muscles</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>Anaphylaxis; Aspiration; Asthma</li>
<li>Cardiac (MI or CHF); COPD</li>
<li>Hyperventilation; Inhaled toxin (CO)</li>
<li>Pericardial tamponade; Pleural effusion</li>
<li>Pneumonia; Pneumothorax; Pulmonary Embolus</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Universal Patient Care protocol; treat per clinical impression</li>
<li><strong>Upper Airway Obstruction:</strong> Sit up; AHA protocol for complete obstruction; transport if not cleared or suspicious of aspiration</li>
<li><strong>Insufficient Respiration or Arrest:</strong> Rule out obstruction; ventilate with BVM; Narcan 2.0 mg IN if cause unknown or narcotics possible</li>
<li><strong>Wheezing:</strong> Assist MDI</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT / AEMT</div><ul>
<li><strong>Wheezing (Asthma/COPD):</strong><ul>
<li>Adult: Albuterol 2.5 mg + Atrovent 0.5 mg via neb; may repeat Albuterol PRN</li>
<li>Pediatric: Albuterol 2.5 mg + Atrovent 0.25 mg in 3.0 mL NS SVN; may repeat ×1; continuous Albuterol 2.5 mg in 3 mL if &lt;5 yr old; use blow-by if &lt;5 yr</li></ul></li>
<li>Consider CPAP</li>
<li>Cyanotic or suspected MI or severe distress: high-flow O₂ by mask; be prepared to assist respiration</li>
<li><strong>Pulmonary Edema:</strong> Sit patient up, dangle legs; CPAP 100% FiO₂ if in extremis; PEEP valve if assisting ventilation; if suspected MI → Chest Pain/ACS protocol; NTG <span class="ws">W*</span> AEMT</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Considerations</div><ul>
<li>Aggressive airway management (SGA <span class="wdbl">W**</span>) for unconscious/unresponsive patient; call ALS when available</li>
<li>Tachypnea: consider all causes (PE, hypoxia, cardiac, infection, trauma) — hyperventilation is a response to underlying problem; do NOT treat by rebreathing CO₂</li>
