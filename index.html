tags:'ibuprofen advil motrin NSAID anti-inflammatory pain fever analgesic',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>NSAID / Analgesic / Antipyretic — inhibits COX-1 and COX-2; reduces prostaglandin synthesis; anti-inflammatory, analgesic, antipyretic</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Indications / Contraindications</div><ul>
<li><strong>Indications:</strong> Pain management; fever reduction in patients &gt;6 months</li>
<li><strong>Contraindications:</strong> Age &lt;6 months; known hypersensitivity to NSAIDs; active GI bleed; significant renal impairment; pregnancy (especially third trimester)</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Dosing</div>
<table class="dose-table"><thead><tr><th>Patient</th><th>Dose</th><th>Route</th><th>Max</th></tr></thead><tbody>
<tr><td>Adult</td><td>400–800 mg PO</td><td>PO</td><td>800 mg per dose</td></tr>
<tr><td>Pediatric (&gt;6 mo)</td><td>10 mg/kg PO</td><td>PO</td><td>800 mg per dose</td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Notes</div><ul>
<li>EMT scope: <span class="ws">W*</span></li>
<li>Onset: 30–60 min; Duration: 4–8 hours</li>
<li>For febrile seizure: consider if child &gt;6 months has already had max acetaminophen dose &lt;4 hr ago and temp &gt;101°F</li>
<li>Side effects: GI upset, GI bleed risk, renal impairment with prolonged use</li></ul></div></div>`},

{id:'med-glucose',title:'Dextrose — Oral Glucose / D10W / D25W / D50W',section:'medications',
tags:'dextrose glucose oral glucose D10 D25 D50 hypoglycemia blood sugar diabetic',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>Carbohydrate / Caloric agent — provides immediate glucose to treat hypoglycemia</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Indications</div><ul>
<li>Hypoglycemia (blood glucose &lt;60 mg/dL in adults; symptomatic hypoglycemia in pediatric patients)</li>
<li>Altered mental status with suspected hypoglycemia</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Dosing</div>
<table class="dose-table"><thead><tr><th>Product</th><th>Dose</th><th>Route</th><th>Level</th></tr></thead><tbody>
<tr><td>Oral Glucose (gel/paste)</td><td>Adult: 25 g (1 tube) | Peds: 0.5–1 g/kg (max 25 g)</td><td>PO — patient must be able to protect airway</td><td>EMR <span class="ws">W*</span></td></tr>
<tr><td>D10W (10% Dextrose)</td><td>Adult: titrate to effect up to 25 g | Peds: 5 mL/kg by infusion (max 250 mL) | Newborn: 2 cc/kg</td><td>IV</td><td>EMT w/IV <span class="ws">W*</span></td></tr>
<tr><td>D25W (25% Dextrose)</td><td>2 mL/kg IV (max 50 mL)</td><td>IV</td><td>AEMT</td></tr>
<tr><td>D50W (50% Dextrose)</td><td>25 g (50 mL) IV for adults</td><td>IV</td><td>AEMT</td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Notes</div><ul>
<li>Check BGL after 5 min; repeat treatment if still &lt;60 mg/dL and patient remains symptomatic</li>
<li>Higher concentrations (D25, D50) cause vein irritation and extravasation risk — use large bore IV, confirm placement</li>
<li>D10 preferred in prehospital setting for IV use (lower osmolarity, safer)</li>
<li>Oral glucose ONLY if patient can protect airway — never in unconscious patient</li></ul></div></div>`},

{id:'med-glucagon',title:'Glucagon',section:'medications',
tags:'glucagon hypoglycemia diabetic IM IN beta blocker calcium channel blocker',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>Pancreatic hormone — stimulates hepatic glycogenolysis, raising blood glucose; also used in beta-blocker/calcium channel blocker overdose</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Indications</div><ul>
<li>Symptomatic hypoglycemia when patient cannot take oral glucose (unconscious, cannot protect airway)</li>
<li>Beta-blocker or calcium channel blocker overdose (ALS-level consideration)</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Dosing</div>
<table class="dose-table"><thead><tr><th>Level</th><th>Patient</th><th>Dose</th><th>Route</th></tr></thead><tbody>
<tr><td>EMT <span class="ws">W*</span></td><td>Adult</td><td>1 mg (1 unit)</td><td>IM / IN</td></tr>
<tr><td>EMT <span class="ws">W*</span></td><td>Pediatric</td><td>0.02 mg/kg IM (max 1 mg)</td><td>IM</td></tr>
<tr><td>AEMT</td><td>Adult</td><td>1 mg IM</td><td>IM</td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Notes</div><ul>
<li>Onset: 8–10 min IM; Duration: 60–90 min</li>
<li>Requires hepatic glycogen stores to work — may be ineffective in malnourished or alcoholic patients</li>
<li>Check BGL again in 10–15 min; transport even if glucose normalizes</li>
<li>Patient may vomit after administration — protect airway</li></ul></div></div>`},

{id:'med-oxygen',title:'Oxygen (O₂)',section:'medications',
tags:'oxygen O2 supplemental hypoxia saturation SpO2 nasal cannula NRB non-rebreather mask BVM',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>Medical gas — essential for cellular metabolism; corrects hypoxemia and tissue hypoxia</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Delivery Devices &amp; Flow Rates</div>
<table class="dose-table"><thead><tr><th>Device</th><th>Flow</th><th>FiO₂</th><th>Level</th></tr></thead><tbody>
<tr><td>Nasal Cannula</td><td>1–6 L/min</td><td>24–44%</td><td>EMR</td></tr>
<tr><td>Simple Face Mask</td><td>6–10 L/min</td><td>35–60%</td><td>EMT</td></tr>
<tr><td>Non-Rebreather Mask (NRB)</td><td>10–15 L/min</td><td>60–90%</td><td>EMR</td></tr>
<tr><td>Partial Rebreather Mask</td><td>6–10 L/min</td><td>35–60%</td><td>EMT</td></tr>
<tr><td>Venturi Mask</td><td>Per port</td><td>24–50% (controlled)</td><td>EMT</td></tr>
<tr><td>BVM</td><td>15 L/min</td><td>~100% (w/ reservoir)</td><td>EMR</td></tr>
<tr><td>CPAP</td><td>15 L/min</td><td>Variable</td><td>EMT <span class="ws">W*</span></td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Target SpO₂ Ranges</div><ul>
<li><strong>Most conditions:</strong> SpO₂ 94–99%</li>
<li><strong>Stroke:</strong> SpO₂ 94–95%</li>
<li><strong>Post-ROSC:</strong> SpO₂ 94–99% (avoid hyperoxia)</li>
<li><strong>CO poisoning:</strong> 100% O₂ via NRB (pulse oximetry unreliable — reads SpO₂ falsely normal)</li>
<li><strong>COPD:</strong> Titrate to 88–92% if patient is a known CO₂ retainer (avoid suppressing hypoxic drive)</li>
<li>Do NOT withhold O₂ from hypoxic patient out of COPD concern — hypoxia kills first</li></ul></div></div>`},

{id:'med-oxymetazoline',title:'Oxymetazoline (Afrin)',section:'medications',
tags:'oxymetazoline afrin nasal decongestant epistaxis nosebleed vasoconstrictor intranasal',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>Alpha-adrenergic agonist / Topical nasal vasoconstrictor — constricts nasal blood vessels; reduces nasal congestion and epistaxis</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Indications / Contraindications</div><ul>
<li><strong>Indications:</strong> Epistaxis (nosebleed) uncontrolled by direct pressure; nasal mucosal bleeding</li>
<li><strong>Contraindications:</strong> Age &lt;6 years; known hypersensitivity</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Dosing</div>
<table class="dose-table"><thead><tr><th>Patient</th><th>Dose</th><th>Route</th><th>Level</th></tr></thead><tbody>
<tr><td>Adult / Pediatric ≥6 yr</td><td>2–3 squirts each nostril IN</td><td>Intranasal</td><td>EMT <span class="ws">W*</span> / AEMT</td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Notes</div><ul>
<li>Onset: 5–10 min; Duration: 6–12 hours</li>
<li>Do NOT use in children under 6 years</li>
<li>Side effects: rebound congestion with prolonged use, hypertension, tachycardia</li></ul></div></div>`},

{id:'med-ipratropium',title:'Ipratropium Bromide (Atrovent / Ipramide)',section:'medications',
tags:'ipratropium atrovent ipramide anticholinergic bronchodilator COPD asthma nebulizer',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>Anticholinergic / Bronchodilator — blocks muscarinic receptors in bronchial smooth muscle; reduces bronchoconstriction and secretions</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Indications</div><ul>
<li>Bronchospasm (asthma, COPD) — typically used in combination with albuterol (DuoNeb)</li>
<li>Respiratory distress with reactive airway disease</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Dosing</div>
<table class="dose-table"><thead><tr><th>Patient</th><th>Dose</th><th>Route</th><th>Level</th></tr></thead><tbody>
<tr><td>Adult</td><td>0.5 mg in 2.5 mL via nebulizer</td><td>Nebulizer</td><td>EMT <span class="ws">W*</span></td></tr>
<tr><td>Pediatric</td><td>0.25 mg in 3.0 mL NS SVN</td><td>Nebulizer</td><td>EMT <span class="ws">W*</span></td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Notes</div><ul>
<li>Onset: 15 min; Peak: 1–2 hours; Duration: 4–6 hours</li>
<li>Often combined with albuterol as DuoNeb for synergistic bronchodilation</li>
<li>Side effects: dry mouth, urinary retention, tachycardia, blurred vision</li>
<li>Less effective as monotherapy than albuterol for acute bronchospasm</li></ul></div></div>`},

{id:'med-pralidoxime',title:'Pralidoxime Chloride (2-PAM Chloride)',section:'medications',
tags:'pralidoxime 2PAM chloride organophosphate nerve agent antidote cholinergic SLUDGE insecticide',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Class / Mechanism</div><ul><li>Cholinesterase reactivator / Nerve agent antidote — reactivates acetylcholinesterase inhibited by organophosphates (if given early); relieves nicotinic effects</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Indications</div><ul>
<li>Organophosphate poisoning (insecticides, nerve agents)</li>
<li>Symptoms: SLUDGE — Salivation, Lacrimation, Urination, Defecation, GI distress, Emesis; PLUS miosis, bronchospasm, bradycardia, seizures</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">Dosing</div>
<table class="dose-table"><thead><tr><th>Patient</th><th>Dose</th><th>Route</th><th>Level</th></tr></thead><tbody>
<tr><td>Adult</td><td>1 auto-injector (600 mg) IM into thigh; may repeat depending on symptoms</td><td>IM</td><td>EMR (auto-injector)</td></tr>
</tbody></table></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Notes</div><ul>
<li>Used alongside Atropine auto-injector (Mark I kit or DuoDote)</li>
<li>Must be given EARLY — becomes less effective as organophosphate-enzyme bond ages ("ages")</li>
<li>Scene safety paramount — decontamination before patient contact in organophosphate exposure</li>
<li>Prepare for copious secretions; suction as needed</li>
<li>Atropine addresses muscarinic (SLUDGE) effects; 2-PAM reactivates cholinesterase and addresses nicotinic (muscle weakness) effects</li></ul></div></div>`},
{id:'general-illness',title:'General Illness',section:'medical',
tags:'general illness sick fever abdominal distension altered consciousness nausea infection cancer sepsis cardiac',
body:`<div class="als-note">⚡ Bold = Consider Paramedic (ALS) eval and/or transport if available</div>
<div class="assess">
<div class="assess-col"><div class="assess-head">History</div>
<div class="sample-note"><a class="mlink" onclick="openProto('mnemonics');return false;" href="#">SAMPLE</a> / <a class="mlink" onclick="openProto('mnemonics');return false;" href="#">OPQRST</a></div><ul>
<li>Duration; Past medical history; Last oral intake</li>
<li>Medications; Immunocompromised</li>
<li>Bloody emesis/diarrhea; Menstrual history</li>
<li>Past surgical history; Environmental exposure/travel history; Age</li></ul></div>
<div class="assess-col"><div class="assess-head">Signs / Symptoms</div><ul>
<li>Abdominal distension</li>
<li class="b">Altered Level of Consciousness</li>
<li>Chills/Rigors; Constipation; Diarrhea</li>
<li>Diaphoretic; Warm; Flushed; Pain</li>
<li class="b">Persistent abnormal vital signs</li>
<li class="b">Shortness of Breath</li></ul></div>
<div class="assess-col"><div class="assess-head">Differential</div><ul>
<li>Cancer/Tumors/Lymphomas; CNS disease/trauma</li>
<li>DKA; Electrolyte abnormalities</li>
<li>Gynecologic disease (ovarian cyst, PID)</li>
<li>Heat Stroke; Hyperthyroid GI/Renal disorders</li>
<li>Infections; Medication/drug reaction</li>
<li>Myocardial infarction; Pregnancy; Psychologic; Sepsis</li></ul></div></div>
<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">EMR</div><ul>
<li>Initiate Universal Patient Care protocol</li>
<li>Place patient in position of comfort</li>
<li>Cardiac High-Risk Score → Chest Pain/ACS/MI/STEMI protocol</li>
<li>Sepsis Screening Tool → Sepsis protocol</li>
<li>Stroke Assessment (FAST/BEFAST/LAMS) → Stroke/TIA/Neurological protocol</li>
<li><span class="ws">W*</span> Check blood glucose level</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">EMT</div><ul>
<li>Consider ECG / 12-lead if available</li>
<li><span class="ws">W*</span> Consider End-Tidal CO₂ if available</li>
<li>Treat pain per Pain Management protocol</li>
<li>Treat nausea/vomiting per Nausea/Vomiting protocol</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">EMT w/ IV Endorsement / AEMT</div><ul>
<li>Consider Vascular Access</li>
<li>SBP &lt;90 mmHg → Shock/Hypotension protocol</li></ul></div></div>`},

{id:'normal-vital-signs',title:'Normal Vital Signs — Reference',section:'admin',
tags:'vital signs normal range blood pressure heart rate respiratory rate temperature pediatric adult',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Adult Normal Ranges</div>
<table class="dose-table"><thead><tr><th>Parameter</th><th>Normal Range</th></tr></thead><tbody>
<tr><td>Systolic BP</td><td>90–140 mmHg</td></tr>
<tr><td>Diastolic BP</td><td>60–90 mmHg</td></tr>
<tr><td>Heart Rate</td><td>60–100 bpm</td></tr>
<tr><td>Respiratory Rate</td><td>12–20 breaths/min</td></tr>
<tr><td>SpO₂</td><td>94–100%</td></tr>
<tr><td>Temperature</td><td>97–99.5°F (36.1–37.5°C)</td></tr>
<tr><td>Blood Glucose</td><td>70–120 mg/dL</td></tr>
<tr><td>EtCO₂</td><td>35–45 mmHg</td></tr>
</tbody></table></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Pediatric Normal Ranges by Age</div>
<table class="dose-table"><thead><tr><th>Age</th><th>HR (bpm)</th><th>RR (/min)</th><th>Min SBP</th></tr></thead><tbody>
<tr><td>Newborn (0–1 mo)</td><td>100–160</td><td>30–60</td><td>&gt;60 mmHg</td></tr>
<tr><td>Infant (1–12 mo)</td><td>100–150</td><td>25–50</td><td>&gt;70 mmHg</td></tr>
<tr><td>Toddler (1–3 yr)</td><td>90–140</td><td>20–30</td><td>&gt;72 mmHg</td></tr>
<tr><td>Preschool (3–6 yr)</td><td>80–120</td><td>20–25</td><td>&gt;76 mmHg</td></tr>
<tr><td>School age (6–12 yr)</td><td>70–110</td><td>15–20</td><td>&gt;84 mmHg</td></tr>
<tr><td>Adolescent (12–18 yr)</td><td>60–100</td><td>12–20</td><td>&gt;90 mmHg</td></tr>
</tbody></table>
<p style="font-size:12px;padding:6px 0;color:var(--txt2)">Min Pediatric SBP formula: 70 + (2 × age in years) for &gt;1 yr</p></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Key Thresholds</div><ul>
<li><strong>Hypotension (adult):</strong> SBP &lt;90 mmHg → treat per Shock/Hypotension protocol</li>
<li><strong>Fever:</strong> Temp &gt;100.4°F (38°C)</li>
<li><strong>Hypothermia:</strong> Core temp &lt;95°F (35°C)</li>
<li><strong>Hypoglycemia:</strong> Blood glucose &lt;60 mg/dL</li>
<li><strong>Hyperglycemia:</strong> Blood glucose &gt;250 mg/dL (symptomatic)</li>
<li><strong>Sepsis HR:</strong> &gt;90 bpm AND RR &gt;22 (plus infection and EtCO₂ &lt;26)</li></ul></div></div>`},

{id:'mnemonics',title:'Mnemonics — Quick Reference',section:'admin',
tags:'SAMPLE OPQRST FAST BEFAST LAMS MARCHH AEIOU TIPS Hs Ts mnemonics memory assessment',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">SAMPLE — Patient History</div><ul>
<li><strong>S</strong> — Signs and Symptoms</li>
<li><strong>A</strong> — Allergies</li>
<li><strong>M</strong> — Medications</li>
<li><strong>P</strong> — Pertinent Past Medical History</li>
<li><strong>L</strong> — Last oral intake (food/fluids/meds)</li>
<li><strong>E</strong> — Events leading up to presentation</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">OPQRST — Pain Assessment</div><ul>
<li><strong>O</strong> — Onset (when did it start?)</li>
<li><strong>P</strong> — Palliation / Provocation (what makes it better or worse?)</li>
<li><strong>Q</strong> — Quality (sharp, dull, crampy, pressure, burning?)</li>
<li><strong>R</strong> — Region / Radiation / Referred</li>
<li><strong>S</strong> — Severity (0–10 scale)</li>
<li><strong>T</strong> — Time (duration, constant vs. intermittent)</li></ul></div>
<div class="lv sga-lv"><div class="lv-tag sga-tag">FAST / BEFAST — Stroke Assessment</div><ul>
<li><strong>B</strong> — Balance (sudden loss)</li>
<li><strong>E</strong> — Eyes (sudden vision change)</li>
<li><strong>F</strong> — Face drooping (ask patient to smile)</li>
<li><strong>A</strong> — Arm weakness (ask patient to raise both arms)</li>
<li><strong>S</strong> — Speech difficulty (ask patient to repeat a phrase)</li>
<li><strong>T</strong> — Time to call 911 / last known well time</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">MARCHH — Trauma Primary Survey</div><ul>
<li><strong>M</strong> — Massive Hemorrhage control</li>
<li><strong>A</strong> — Airway management</li>
<li><strong>R</strong> — Respirations / Breathing</li>
<li><strong>C</strong> — Circulation assessment</li>
<li><strong>H</strong> — Head injury / neurological assessment</li>
<li><strong>H</strong> — Hypothermia prevention</li></ul></div>
<div class="lv aemt-lv"><div class="lv-tag aemt-tag">Hs and Ts — Cardiac Arrest Reversible Causes</div><ul>
<li><strong>Hs:</strong> Hypovolemia · Hypoxia · H⁺ ions (Acidosis) · Hyper/Hypokalemia · Hypothermia · Hypoglycemia</li>
<li><strong>Ts:</strong> Toxins · Tamponade (cardiac) · Tension Pneumothorax · Thrombosis (pulmonary/coronary) · Trauma</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">More Mnemonics</div><ul>
<li><strong>AEIOU-TIPS</strong> (AMS): Alcohol/Acidosis · Epilepsy/Electrolytes/Endocrine · Insulin · Opiates/Overdose/Oxygen · Uremia · Trauma · Infection · Psychiatric/Poisoning · Syncope/Stroke/Seizure</li>
<li><strong>SLUDGE</strong> (Organophosphate/Cholinergic): Salivation · Lacrimation · Urination · Defecation · GI distress · Emesis</li>
<li><strong>DUMBBELS</strong> (Cholinergic): Defecation · Urination · Miosis · Bradycardia/Bronchospasm · Emesis · Lacrimation · Salivation</li>
<li><strong>AVPU</strong> (LOC): Alert · Verbal (responds to voice) · Pain (responds to pain) · Unresponsive</li>
<li><strong>LAMS</strong> (Large Vessel Occlusion): Facial droop (0–1) + Arm weakness (0–2) + Grip strength (0–2) — score ≥4 suggests LVO</li></ul></div></div>`},

{id:'release-of-responsibility',title:'Release of Responsibility / Against Medical Advice (AMA)',section:'admin',
tags:'AMA against medical advice refusal ROR release responsibility decision making capacity',
body:`<div class="mgmt">
<div class="lv emr-lv"><div class="lv-tag emr-tag">Release of Responsibility (ROR) — All Conditions Must Be Met</div><ul>
<li>No substantial medical intervention has been rendered by EMS</li>
<li>There is no potential risk for loss of life or limb</li>
<li>It is reasonable not to expect a recurrence of the condition within the next 6 hours</li>
<li>There is an individual with adequate decision-making capacity who can observe the patient for a reasonable amount of time</li>
<li>No adult online medical control contact is necessary under these criteria</li></ul></div>
<div class="lv emt-lv"><div class="lv-tag emt-tag">Decision-Making Capacity Checklist</div><ul>
<li>Patient understands the nature of their condition</li>
<li>Patient understands the proposed treatment and its risks/benefits</li>
<li>Patient understands the consequences of refusing treatment/transport</li>
<li>Patient can communicate a consistent decision</li>
<li>Decision is not solely the result of intoxication or psychiatric crisis</li></ul></div>
<div class="lv iv-lv"><div class="lv-tag iv-tag">AMA Procedure</div><ul>
<li>Explain clearly the potential risks of refusal in terms patient can understand</li>
<li>Offer alternatives: treatment without transport, alternative transport, patient's own physician</li>
<li>Document patient's decision in their own words as much as possible</li>
<li>Have patient sign refusal form if possible; document if patient refuses to sign</li>
<li>Have a witness sign if available</li>
<li>Advise patient to call 911 again if condition changes or worsens</li>
<li>Contact online medical control if capacity is in question</li></ul></div>
<div class="lv consider-lv"><div class="lv-tag consider-tag">Special Situations</div><ul>
<li>Minors CANNOT refuse care without parent/guardian consent (exception: emancipated minors)</li>
<li>Intoxicated patients generally lack decision-making capacity — do not accept refusal</li>
<li>Patients with altered mental status lack capacity — do not accept refusal</li>
<li>Psychiatric patients may or may not have capacity depending on the specific situation — contact medical control</li>
<li>Document ALL refusals thoroughly regardless of apparent patient condition</li></ul></div></div>`},
// PROTOCOLS_END
];

/* ── App state ── */
let activeSection = 'all';
let searchQuery = '';

/* ── Search + filter ── */
function getVisible(){
  const q = searchQuery.toLowerCase();
  return PROTOCOLS.filter(p=>{
    const secOk = activeSection==='all' || p.section===activeSection;
    if(!secOk) return false;
    if(!q) return true;
    return p.title.toLowerCase().includes(q) ||
           p.tags.toLowerCase().includes(q) ||
           p.body.toLowerCase().includes(q);
  });
}

function hl(t){
  if(!searchQuery) return t;
  const re=new RegExp('('+searchQuery.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return t.replace(re,'<mark>$1</mark>');
}

/* ── Render card list ── */
function render(){
  const list=document.getElementById('list');
  const vis=getVisible();
  if(!vis.length){
    list.innerHTML='<div class="no-results">No protocols match. Try different terms.</div>';
    return;
  }
  list.innerHTML=vis.map(p=>`
    <div class="card c-${p.section}" onclick="openProto('${p.id}')" role="button" tabindex="0">
      <div class="card-hdr">
        <span class="sec-dot"></span>
        <span class="card-title">${hl(p.title)}</span>
        <span class="sec-badge">${p.section==='admin'?'ADMIN':p.section==='medical'?'MED':p.section==='trauma'?'TRAUMA':p.section==='procedures'?'PROC':'MED'}</span>
      </div>
      <div class="card-tags">${p.tags.split(' ').slice(0,6).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>`).join('');
}

/* ── Open protocol detail ── */
function openProto(id){
  const p=PROTOCOLS.find(x=>x.id===id);
  if(!p) return;
  const modal=document.getElementById('modal');
  document.getElementById('modal-title').textContent=p.title;
  const badge=document.getElementById('modal-badge');
  badge.textContent=p.section.toUpperCase();
  badge.style.background=
    p.section==='medical'?'#1565c0':
    p.section==='trauma'?'#c62828':
    p.section==='procedures'?'#6a1b9a':
    p.section==='medications'?'#2e7d32':'#455a64';
  document.getElementById('modal-body').innerHTML=p.body;
  modal.hidden=false;
  modal.scrollTop=0;
  history.pushState({proto:id},'','#'+id);
}

function closeModal(){
  const modal=document.getElementById('modal');
  modal.hidden=true;
  if(location.hash) history.back();
}

window.addEventListener('popstate',()=>{
  if(!location.hash) document.getElementById('modal').hidden=true;
  else openProto(location.hash.slice(1));
});

if(location.hash){
  const id=location.hash.slice(1);
  if(PROTOCOLS.find(x=>x.id===id)) setTimeout(()=>openProto(id),200);
}

 * A department profile restricts which protocols/medications appear.
 * Shape: { id: string, name: string, hiddenProtocols: string[],
 *           notes: {[protocolId]: string} }
 * Set via: applyDepartment(DEPARTMENTS['king-county'])
 * Reset via: applyDepartment(null)
 * ------------------------------------------------------------------ */
const DEPARTMENTS = {
  // placeholder — add real department profiles here
  // 'example': { id:'example', name:'Example EMS', hiddenProtocols:[], notes:{} }
};
let activeDept = null;
function applyDepartment(dept){
  activeDept = dept;
  render();
}

/* ── Filter tabs ── */
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeSection=btn.dataset.s;
    render();
  });
});

/* ── Search ── */
const si=document.getElementById('search');
const sc=document.getElementById('sclear');
si.addEventListener('input',()=>{
  searchQuery=si.value.trim();
  sc.hidden=!searchQuery;
  render();
});
sc.addEventListener('click',()=>{
  si.value='';searchQuery='';sc.hidden=true;si.focus();render();
});

/* ── Quick access ── */
document.querySelectorAll('[data-goto]').forEach(btn=>{
  btn.addEventListener('click',()=>openProto(btn.dataset.goto));
});

/* ── Back to top ── */
const tb=document.getElementById('topbtn');
window.addEventListener('scroll',()=>{tb.hidden=window.scrollY<300},{passive:true});
tb.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

/* ── Service worker ── */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

/* ── Init ── */
render();
</script>
